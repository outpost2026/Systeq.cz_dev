<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg-base:#080a0c;
  --bg-panel:#0b0d10;
  --bg-card:#0d0f12;
  --bg-card-hover:#111419;
  --bg-inset:#090b0d;
  --rust:#b7410e;
  --rust-dim:rgba(183,65,14,.10);
  --rust-dim2:rgba(183,65,14,.18);
  --rust-border:rgba(183,65,14,.28);
  --blood:#6b0000;
  --blood-border:rgba(107,0,0,.3);
  --concrete:#8a8a8a;
  --text-muted:#5c5c5c;
  --text-dim:#2a2a2a;
  --mud:#3a3a3a;
  --dirt:rgba(255,255,255,.035);
  --dirt-mid:rgba(255,255,255,.07);
  --dirt-strong:rgba(255,255,255,.12);
  --font:'JetBrains Mono',monospace;
}

html{scroll-behavior:smooth}
body{
  font-family:var(--font);
  background:var(--bg-base);
  color:var(--concrete);
  font-size:14px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

body::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 3px);
  pointer-events:none;z-index:0;
}

.container{max-width:1120px;margin:0 auto;padding:0 2rem;position:relative;z-index:1}

/* ─── HEADER ─── */
header{
  border-bottom:1px solid var(--dirt);
  background:rgba(8,10,12,.94);
  backdrop-filter:blur(10px);
  position:sticky;top:0;z-index:200;
}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:.7rem 0;gap:1rem}
.logo{font-size:1.05rem;font-weight:700;letter-spacing:.12em;color:var(--concrete);text-decoration:none;display:flex;align-items:center;gap:.4rem}
.logo:hover{color:var(--dirt-strong)}
.logo-sys{color:#0d9488;font-weight:700}
.logo-teq{color:#D35400;font-weight:700}
.hback{color:var(--text-muted);text-decoration:none;font-size:.75rem;letter-spacing:.07em;transition:color .2s;display:flex;align-items:center;gap:.3rem}
.hback:hover{color:var(--concrete)}
.hnav{display:flex;align-items:center;gap:1.25rem}
.hnav-cur{font-size:.75rem;letter-spacing:.1em;color:var(--rust);font-weight:500}

/* ─── HERO ─── */
.hero{padding:2.5rem 0 2rem;border-bottom:1px solid var(--dirt)}
.hero-eyebrow{font-size:.6rem;letter-spacing:.24em;color:var(--text-dim);margin-bottom:.35rem}
.h1-symbol{color:var(--rust);font-size:2.9em;display:inline-block;margin-right:.25rem;vertical-align:middle;line-height:1;filter:drop-shadow(0 0 10px rgba(183,65,14,.35)) drop-shadow(0 0 2px rgba(183,65,14,.5));opacity:.92;position:relative;top:-.03em}
.hero h1{font-size:clamp(2rem,5vw,3.4rem);font-weight:900;letter-spacing:.04em;line-height:1.1;margin-bottom:.5rem;color:#ddd;text-shadow:-2px 0 2px rgba(183,65,14,.35),2px 0 2px rgba(13,148,136,.25),0 0 1px rgba(255,255,255,.06);display:flex;align-items:center}
.hero-sub{font-size:1rem;color:var(--concrete);font-weight:400;letter-spacing:.06em;max-width:560px;line-height:1.7}

/* ─── FILTERS ─── */
.category-filter{display:flex;gap:.75rem;margin-top:2rem;flex-wrap:wrap}
.filter-btn{background:transparent;border:1px solid var(--dirt-mid);color:var(--text-muted);font-family:var(--font);font-size:.7rem;padding:.4rem .85rem;cursor:pointer;transition:border-color .2s,color .2s,background .2s}
.filter-btn:hover{border-color:var(--rust-border);color:var(--concrete)}
.filter-btn.active{background:var(--rust-dim2);border-color:var(--rust);color:var(--rust)}

/* ─── TRACK GRID ─── */
.tracks-section{padding:2.5rem 0 4rem}
.track-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem}
@media(max-width:960px){.track-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:620px){.track-grid{grid-template-columns:1fr}}

.track-card{
  background:var(--bg-card);
  border:1px solid var(--dirt);
  display:flex;flex-direction:column;
  transition:border-color .25s,background .25s;
}
.track-card:hover{border-color:var(--rust-border);background:var(--bg-card-hover)}
.track-card.playing{border-color:var(--rust-border)}
.track-card.hidden{display:none!important}

.track-card.placeholder{opacity:.45;filter:grayscale(.8);pointer-events:none}
.track-card.placeholder .play-btn{opacity:0}
.placeholder-label{font-size:.6rem;letter-spacing:.18em;color:var(--text-dim);text-transform:uppercase;text-align:center;padding:.5rem;border-top:1px solid var(--dirt)}

/* cover */
.track-cover{
  position:relative;
  aspect-ratio:1/1;
  overflow:hidden;
  background:var(--bg-inset);
  border-bottom:1px solid var(--dirt);
}
.track-cover img{
  width:100%;height:100%;object-fit:cover;display:block;
  filter:saturate(.65) contrast(1.1);
  transition:filter .3s;
}
.track-card:hover .track-cover img{filter:saturate(.8) contrast(1.15)}
.play-btn{
  position:absolute;top:.65rem;left:.65rem;
  width:36px;height:36px;
  background:rgba(8,10,12,.82);
  border:1px solid var(--dirt-strong);
  color:var(--concrete);
  font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font);
  transition:background .2s,border-color .2s,color .2s;
  line-height:1;
}
.play-btn:hover{background:rgba(183,65,14,.25);border-color:var(--rust-border);color:var(--rust)}
.play-btn.playing{background:rgba(183,65,14,0.2);border-color:var(--rust-border);color:var(--rust)}
.play-btn.error{color:#6b0000;border-color:rgba(107,0,0,.4)}

/* progress bar at bottom of cover */
.track-progress{
  position:absolute;bottom:0;left:0;right:0;
  height:2px;background:var(--dirt-mid);opacity:0;
  transition:opacity .25s;
}
.track-progress.active{opacity:1}
.track-progress-fill{height:100%;background:var(--rust);width:0;transition:width .1s linear}

/* info below cover */
.track-body{padding:.85rem .9rem;flex:1;display:flex;flex-direction:column;gap:.35rem}
.track-title{font-size:.82rem;font-weight:700;letter-spacing:.04em;color:#b0b0b0;line-height:1.3}
.track-meta{font-size:.62rem;color:var(--text-muted);letter-spacing:.06em;display:flex;gap:.75rem}
.track-meta span{display:flex;align-items:center;gap:.25rem}
.track-meta .bpm{color:var(--rust);opacity:.7}
.track-meta .tuning{color:var(--text-dim)}

/* lyrics prose block */
.track-lyrics{margin-top:.25rem;border-top:1px solid var(--dirt);padding:.5rem .9rem .7rem}
.track-lyrics pre{
  font-family:var(--font);
  font-size:.62rem;
  color:#b0b0b0;
  line-height:1.7;
  max-height:160px;
  overflow-y:auto;
  white-space:pre-wrap;
  word-wrap:break-word;
  font-weight:400;
  letter-spacing:.02em;
}
.track-lyrics pre::-webkit-scrollbar{width:4px}
.track-lyrics pre::-webkit-scrollbar-track{background:transparent}
.track-lyrics pre::-webkit-scrollbar-thumb{background:var(--dirt-mid);border-radius:0}

/* scrollbar general */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg-inset)}
::-webkit-scrollbar-thumb{background:var(--dirt-mid);border-radius:0}
::-webkit-scrollbar-thumb:hover{background:var(--dirt-strong)}

/* ─── FOOTER ─── */
footer{border-top:1px solid var(--dirt);padding:1.25rem 0}
.footer-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem}
.footer-logo{font-size:.75rem;font-weight:700;letter-spacing:.12em;color:var(--text-muted)}
.footer-logo .logo-sys{color:#0d9488;font-weight:700}
.footer-logo .logo-teq{color:#D35400;font-weight:700}
.footer-meta{font-size:.62rem;color:var(--text-dim);letter-spacing:.04em}

@media(max-width:620px){
  .container{padding:0 1.1rem}
  .hero{padding:1.75rem 0 1.5rem}
  .tracks-section{padding:1.5rem 0 2.5rem}
  .header-inner{flex-wrap:wrap;gap:.5rem}
  .h1-symbol{font-size:2em}
  .hero h1{font-size:clamp(1.6rem,7vw,2.4rem)}
  .hero-sub{font-size:.82rem}
}
</style>
</head>

      '',
      'V tom prvním případě vaše mysl spadla přímo do cíle, jako kámen do studny.',
      'Ale ve druhém případě kroužíte někde na orbitě, vidíte cíl pod sebou,',

      'A tohle tenhle fascinující fenomén správně přivádí k našemu dnešnímu tématu.',

      '',
      'To je docela hutný text.',
      'Ten text předkládá mimořádně radikální pohled na to, co to vlastně znamená myslet.',

      'No, to je to hlavní, o co tu běží.',

      'ten absolutně minimální možný algoritmus, který popíše realitu.',
      'Aby se dala zpětně rekonstruovat.',
      '',
      'Autor nám tu nabízí fantastickou metaforu.',

      'A mozek přece dělá úplně to samé, jen nevykresluje videohru na monitoru,',

      'Z čehož je vidět, jak dobře to funguje jako deskripce.',
      'Jako deskripce je to bezchybné.',
      'Ale moje kritika směřuje o patro výš.',
      'Nesouhlasím s tím, že tento model stačí na vysvětlení toho,',
      'čemu text říká režim 3, tedy topologické emergenci,',

// ─── Render ───
function renderTracks() {
  const grid = document.getElementById('track-grid');
  grid.innerHTML = '';
  TRACKS.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'track-card';
    card.dataset.index = i;
    card.dataset.category = t.category;

    const isPlaceholder = !t.audio;
    if (isPlaceholder) card.classList.add('placeholder');

    const metaParts = [t.duration];
    if (t.bpm) metaParts.push(`<span class="bpm">${t.bpm}</span>`);
    if (t.tuning) metaParts.push(`<span class="tuning">${t.tuning}</span>`);

    const coverHtml = t.cover
      ? `<img src="${t.cover}" alt="${t.title}" loading="lazy" onerror="this.style.display='none'">`
      : '';
    const playBtnHtml = isPlaceholder ? '' : `<button class="play-btn" data-index="${i}">▶</button>`;

    const durationId = `duration-${i}`;
    card.innerHTML = `
      <div class="track-cover">
        ${coverHtml}
        ${playBtnHtml}
        <div class="track-progress" data-progress="${i}"><div class="track-progress-fill"></div></div>
      </div>
      <div class="track-body">
        <div class="track-title">${t.title}</div>
        <div class="track-meta"><span data-duration="${durationId}">${t.duration}</span>${t.bpm ? ` · <span class="bpm">${t.bpm}</span>` : ''}${t.tuning ? ` · <span class="tuning">${t.tuning}</span>` : ''}</div>
      </div>
      <div class="track-lyrics"><pre>${t.lyrics.join('\n')}</pre></div>
      ${isPlaceholder ? '<div class="placeholder-label">coming soon</div>' : ''}
      ${t.audio ? `<audio data-audio="${i}" preload="metadata" src="${t.audio}" type="${t.audio.endsWith('.mp3') ? 'audio/mpeg' : 'audio/mp4'}"></audio>` : ''}
    `;
    grid.appendChild(card);

    // Auto-detect duration from audio metadata
    if (t.audio) {
      const audioEl = card.querySelector('audio');
      const durEl = card.querySelector(`[data-duration="${durationId}"]`);
      audioEl.onloadedmetadata = () => {
        const sec = Math.floor(audioEl.duration);
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        durEl.textContent = `${m}:${String(s).padStart(2, '0')}`;
      };
    }
  });
}

// ─── Filtrování ───
function setupFilters() {
  const buttons = document.querySelectorAll('.filter-btn');
  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const category = btn.dataset.category;
      document.querySelectorAll('.track-card').forEach(card => {
        card.classList.toggle('hidden', category !== 'all' && card.dataset.category !== category);
      });
    });
  });
}

renderTracks();
setupFilters();

// ─── Playback ───
let currentIndex = -1;
let currentAudio = null;
let rafId = null;

function updateProgress() {
  if (!currentAudio || currentIndex < 0) return;
  const pct = (currentAudio.currentTime / currentAudio.duration) * 100;
  const fill = document.querySelector(`.track-progress[data-progress="${currentIndex}"] .track-progress-fill`);
  if (fill) fill.style.width = Math.min(pct, 100) + '%';
  if (currentAudio.ended) {
    stopPlayback();
    return;
  }
  rafId = requestAnimationFrame(updateProgress);
}

function stopPlayback() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
  }
  const prevBtn = document.querySelector(`.play-btn[data-index="${currentIndex}"]`);
  if (prevBtn) { prevBtn.textContent = '▶'; prevBtn.classList.remove('playing'); }
  const prevCard = document.querySelector(`.track-card[data-index="${currentIndex}"]`);
  if (prevCard) prevCard.classList.remove('playing');
  const prevProg = document.querySelector(`.track-progress[data-progress="${currentIndex}"]`);
  if (prevProg) { prevProg.classList.remove('active'); prevProg.querySelector('.track-progress-fill').style.width = '0'; }
  currentIndex = -1;
}

function togglePlay(idx) {
  const btn = document.querySelector(`.play-btn[data-index="${idx}"]`);
  const audio = document.querySelector(`audio[data-audio="${idx}"]`);
  const prog = document.querySelector(`.track-progress[data-progress="${idx}"]`);
  const card = document.querySelector(`.track-card[data-index="${idx}"]`);

  if (!audio || !btn) return;

  if (currentIndex === idx) {
    if (!audio.paused) {
      audio.pause();
      btn.textContent = '▶';
      btn.classList.remove('playing');
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      return;
    } else {
      audio.play().catch(() => {});
      btn.textContent = '⏸';
      btn.classList.add('playing');
      prog.classList.add('active');
      card.classList.add('playing');
      rafId = requestAnimationFrame(updateProgress);
      return;
    }
  }

  stopPlayback();
  currentIndex = idx;
  currentAudio = audio;
  audio.currentTime = 0;
  audio.play().catch(() => {});
  btn.textContent = '⏸';
  btn.classList.add('playing');
  prog.classList.add('active');
  card.classList.add('playing');
  rafId = requestAnimationFrame(updateProgress);

  audio.onerror = () => {
    btn.textContent = '✕';
    btn.classList.add('error');
    stopPlayback();
  };
  audio.onended = () => { stopPlayback(); };
}

document.addEventListener('click', e => {
  const btn = e.target.closest('.play-btn');
  if (btn) {
    const idx = parseInt(btn.dataset.index);
    togglePlay(idx);
  }
});
</script>

</body>
</html>
