<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SYSTEQ // CNC Entropy Reduction</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e14;overflow:hidden;font-family:'JetBrains Mono',monospace}
canvas{display:block}
.css-label{font-family:'JetBrains Mono',monospace;white-space:nowrap;text-shadow:0 0 6px rgba(0,0,0,0.9);pointer-events:none}
</style>
</head>
<body>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from'three';
import{CSS2DRenderer,CSS2DObject}from'three/addons/renderers/CSS2DRenderer.js';

// ── Helpers ──
const box=(w,h,d)=>new THREE.BoxGeometry(w,h,d);
const cyl=(r,h,s)=>new THREE.CylinderGeometry(r,r,h,s||8);
const tor=(R,r,rs,ts)=>new THREE.TorusGeometry(R,r,rs||8,ts||16);
const mF=c=>new THREE.MeshStandardMaterial({color:c,flatShading:true});
const mE=(c,ei)=>new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:ei||0.5,flatShading:true});
const mA=new THREE.MeshBasicMaterial({color:0xFFFFFF,transparent:true,opacity:0.4,side:THREE.DoubleSide});
const M=(g,c)=>new THREE.Mesh(g,mF(c));
const GND=-0.55,DSK_Y=0.22;

let startT,entropyDiv,parserDiv,ltChars=[],dataCubes=[],panels=[],dollars=[],main;
let shockwave,flashDone,lastSpawn=-1,rearrangeStart=-1,dollarIdx=0,plGantry;
const dollarAt=[12,14,16,18];

function init(){
  const W=innerWidth,H=innerHeight;
  const scene=new THREE.Scene;scene.background=new THREE.Color(0x0a0e14);
  const cam=new THREE.PerspectiveCamera(45,W/H,0.1,30);
  cam.position.set(0,3,8);cam.lookAt(0,0.3,0);
  const ren=new THREE.WebGLRenderer({antialias:true});ren.setSize(W,H);ren.setPixelRatio(Math.min(devicePixelRatio,2));
  document.body.appendChild(ren.domElement);
  const lr=new CSS2DRenderer;lr.setSize(W,H);lr.domElement.style.cssText='position:absolute;top:0;pointer-events:none';
  document.body.appendChild(lr.domElement);
  scene.add(new THREE.AmbientLight(0x303050));
  const s=new THREE.DirectionalLight(0xffeedd,0.8);s.position.set(2,5,3);scene.add(s);
  scene.add(new THREE.PointLight(0xFDE047,0.6,6).translateY(0.5));
  main=new THREE.Group;scene.add(main);
  // Floor
  main.add(M(box(7,0.03,5),0x0F172A).translateY(GND-0.015));

  // ── PC Workstation (x=-3) ──
  const pc=new THREE.Group;pc.position.set(-3,0,0.5);
  pc.add(M(box(0.9,0.04,0.6),0x475569).translateY(DSK_Y+0.02));//desk
  pc.add(M(box(0.06,0.55,0.5),0x334155).translateX(-0.38).translateY(DSK_Y-0.28));//leg L
  pc.add(M(box(0.06,0.55,0.5),0x334155).translateX(0.38).translateY(DSK_Y-0.28));//leg R
  // monitor
  const mt=monitorTex();const monM=new THREE.MeshStandardMaterial({map:mt,roughness:0.2});
  pc.add(new THREE.Mesh(box(0.55,0.38,0.03),monM).translateY(DSK_Y+0.23));
  pc.add(M(box(0.15,0.1,0.15),0x475569).translateY(DSK_Y+0.07).translateZ(0.18));//stand
  pc.add(M(box(0.38,0.03,0.12),0x334155).translateY(DSK_Y+0.035).translateZ(0.3));//kbd
  pc.add(M(box(0.14,0.44,0.38),0x1E293B).translateX(-0.48).translateY(GND+0.22).translateZ(0.3));//tower
  main.add(pc);

  // ── Operator (near PC, x≈-2.1) ──
  const op=new THREE.Group;const ox=-2.1,oz=1.1;
  const btm=GND,shinTop=btm+0.39,waistBtm=shinTop+0.14, torsoBtm=waistBtm+0.22, shoulder=torsoBtm+0.35;
  for(const s of[0,0.22]){
    op.add(M(box(0.19,0.07,0.22),0x1E293B).translateX(ox+s).translateZ(oz).translateY(btm+0.035));//boot
    op.add(M(box(0.15,0.32,0.15),0xF5D0A9).translateX(ox+s).translateZ(oz).translateY(btm+0.235));//shin
    op.add(M(box(0.17,0.14,0.17),0x1E3A5F).translateX(ox+s).translateZ(oz).translateY(shinTop+0.07));//short
  }
  op.add(M(box(0.48,0.22,0.28),0x1E3A5F).translateX(ox+0.11).translateZ(oz).translateY(waistBtm+0.11));//waist
  op.add(M(box(0.54,0.42,0.32),0x1E3A5F).translateX(ox+0.11).translateZ(oz).translateY(torsoBtm+0.21));//torso
  // left arm (hanging)
  op.add(M(box(0.12,0.22,0.12),0x1E3A5F).translateX(ox-0.2).translateZ(oz).translateY(shoulder-0.11));
  op.add(M(box(0.10,0.22,0.10),0x1E3A5F).translateX(ox-0.2).translateZ(oz).translateY(shoulder-0.33));
  op.add(M(box(0.09,0.09,0.09),0xF5D0A9).translateX(ox-0.2).translateZ(oz).translateY(shoulder-0.48));
  // right arm (bent up to mouth)
  op.add(M(box(0.12,0.22,0.12),0x1E3A5F).translateX(ox+0.42).translateZ(oz).translateY(shoulder-0.11));
  const rag=new THREE.Group;rag.position.set(ox+0.42,shoulder-0.33,oz);rag.rotation.z=-0.7;
  rag.add(M(box(0.10,0.24,0.10),0x1E3A5F).translateY(0.12));
  rag.add(M(box(0.09,0.09,0.09),0xF5D0A9).translateY(0.28));
  op.add(rag);
  // head group
  const hg=new THREE.Group;hg.position.set(ox+0.11,torsoBtm+0.61,oz);
  hg.add(M(box(0.40,0.40,0.40),0xF5D0A9));//head
  hg.add(M(box(0.07,0.05,0.03),0xFFFFFF).translateX(-0.08).translateY(0.05).translateZ(0.21));//eyes
  hg.add(M(box(0.07,0.05,0.03),0xFFFFFF).translateX(0.08).translateY(0.05).translateZ(0.21));
  hg.add(M(box(0.14,0.04,0.03),0x1E293B).translateY(-0.06).translateZ(0.21));//smile
  hg.add(M(box(0.44,0.10,0.32),0x1E293B).translateY(0.24));//cap
  hg.add(M(box(0.22,0.04,0.16),0x0D9488).translateY(0.22).translateZ(0.20));//visor SYS
  hg.add(M(box(0.07,0.05,0.03),0xD35400).translateY(0.28).translateZ(0.21));//logo TEQ
  op.add(hg);
  // mug + steam
  const mug=new THREE.Group;mug.add(M(cyl(0.09,0.18,8),0x78350F));
  mug.add(new THREE.Mesh(tor(0.075,0.02),mF(0x78350F)).translateX(0.09));
  mug.position.set(ox+0.38,shoulder-0.22,oz-0.04);
  for(let i=0;i<4;i++){
    const sb=M(box(0.03,0.08,0.03),0xE2E8F0);sb.material.transparent=true;sb.material.opacity=0.5;
    sb.position.set(0,-0.06+i*0.10,0);sb.userData={by:-0.06,ph:i*0.7};mug.add(sb);
  }
  op.add(mug);main.add(op);
  // store refs for anim: hg,mug
  const headGrp=hg,mugGrp=mug,steamBoxes=[...mug.children].filter(c=>c.userData?.by!==undefined);

  // ── Plotter (x=0) ──
  const pl=new THREE.Group;pl.position.set(0,0,0);
  pl.add(M(box(2.5,0.06,1.2),0x334155).translateY(DSK_Y+0.03));//table
  for(const lx of[-1.1,1.1])for(const lz of[-0.5,0.5])pl.add(M(box(0.08,0.46,0.08),0x1E293B).translateX(lx).translateY(GND+0.23).translateZ(lz));//4legs
  plGantry=M(box(0.12,0.16,1.32),0x64748B).translateY(DSK_Y+0.11);pl.add(plGantry);//gantry
  pl.add(M(box(0.2,0.14,0.2),0x334155).translateY(DSK_Y+0.18));//carriage
  pl.add(M(cyl(0.04,0.18,8),0x94A3B8).translateY(DSK_Y+0.02));//tool
  main.add(pl);

  // ── Library (x=+3) ──
  const lib=new THREE.Group;lib.position.set(3,0,0);
  lib.add(M(box(0.08,0.8,0.6),0x475569).translateX(-0.4));//pillarL
  lib.add(M(box(0.08,0.8,0.6),0x475569).translateX(0.4));//pillarR
  for(let i=0;i<3;i++)lib.add(M(box(0.88,0.04,0.6),0x64748B).translateY(GND+0.15+i*0.22));//shelves
  main.add(lib);

  // ── Portal (hidden until t=8) ──
  const portal=new THREE.Group;portal.visible=false;
  portal.add(new THREE.Mesh(new THREE.TorusKnotGeometry(0.5,0.05,64,10),mE(0xFDE047,0.35)));
  portal.position.set(-1.5,0.55,0.3);main.add(portal);

  // ── Shockwave sphere ──
  shockwave=new THREE.Mesh(new THREE.SphereGeometry(1,16,16),mA);
  shockwave.position.copy(portal.position);shockwave.visible=false;main.add(shockwave);

  // ── Data flow cubes ──
  const Dsrc=new THREE.Vector3(-3.3,0.4,0.5),Dtgt=new THREE.Vector3(-0.1,0.28,0.2);
  for(let i=0;i<6;i++){
    const dc=M(box(0.06,0.06,0.06),0xC62828);
    dc.userData={p:i/6,s:0.12+Math.random()*0.04};main.add(dc);dataCubes.push(dc);
  }

  // ── CSS2D Labels ──
  const lbl=new THREE.Group;
  entropyDiv=el('ENTROPY: 94% ▰▰▰▰▰▰▰▰▰▰','14px','#EF4444');
  lbl.add(new CSS2DObject(entropyDiv).translateY(2.5));
  parserDiv=el('','11px','#FDE047');
  lbl.add(new CSS2DObject(parserDiv).translateY(2.2));
  // Chinese chars along data path
  const chPos=[[-2.6,0.7,0.4],[-1.9,0.6,0.35],[-1.2,0.5,0.3],[-0.5,0.4,0.25]];
  const chTxt=['数','据','乱','码'];
  chTxt.forEach((t,i)=>{
    const d=el(t,'15px','#EF4444');ltChars.push(d);
    lbl.add(new CSS2DObject(d).position.set(chPos[i][0],chPos[i][1],chPos[i][2]));
  });
  main.add(lbl);

  // Resize
  addEventListener('resize',()=>{const w=innerWidth,h=innerHeight;cam.aspect=w/h;cam.updateProjectionMatrix();ren.setSize(w,h);lr.setSize(w,h)});

  startT=performance.now();
  ren.setAnimationLoop(()=>animate(ren,lr,scene,cam,main,portal,pl,headGrp,mugGrp,steamBoxes));
}

function el(txt,fs,cl){
  const d=document.createElement('div');d.className='css-label';
  d.style.fontSize=fs;d.style.color=cl;d.textContent=txt||'';return d;
}
function monitorTex(){
  const c=document.createElement('canvas');c.width=256;c.height=160;
  const x=c.getContext('2d');x.fillStyle='#0A0E14';x.fillRect(0,0,256,160);
  x.strokeStyle='#EF4444';x.lineWidth=3;x.strokeRect(6,6,244,148);
  x.fillStyle='#E2E8F0';x.font='15px monospace';x.fillText('数据处理失败',14,34);
  x.fillStyle='#94A3B8';x.font='11px monospace';
  x.fillText('E8 A3 6F  7E 2B 4C',14,60);x.fillText('A1 B2 C3  D4 E5 F6',14,78);
  x.fillText('B0 5F 9C  A8 1D 3E',14,96);
  x.fillStyle='#EF4444';x.font='bold 12px monospace';x.fillText('FORMAT: UNKNOWN',14,140);
  return new THREE.CanvasTexture(c);
}

// ── Panel management ──
function spawnPanel(defective){
  const p=M(box(1.2,0.1,0.8),defective?0xE65100:0x78350F);
  p.position.set(0.5,0.2,0.6);//plotter output
  const rx=0.2+Math.random()*1.0,rz=0.3+(Math.random()-0.5)*1.6;
  p.userData={defective,tX:rx,tZ:rz,vY:0,fallen:false,o:null,at:null};
  if(defective){
    const df=M(box(0.2,0.05,0.15),0xEF4444);df.position.set(0.5,0.1,0.3);p.add(df);p.userData.df=df;
  }
  panels.push(p);main.add(p);
}

// ── Animate ──
function animate(ren,lr,scene,cam,main,portal,pl,headGrp,mugGrp,steamBoxes){
  const t=(performance.now()-startT)/1000;

  // ── Entropy bar ──
  let entropy;
  if(t<8)entropy=94;else if(t<10)entropy=94-(t-8)/2*44;else if(t<20)entropy=50-(t-10)/10*44;else entropy=6;
  const e=Math.round(entropy),filled=Math.max(0,Math.min(10,Math.round(e/10)));
  const bar='\u25B0'.repeat(filled)+'\u25B1'.repeat(10-filled);
  entropyDiv.textContent='ENTROPY: '+e+'% '+bar;
  const te=(entropy-6)/88,R=Math.round(239*te+34*(1-te)),G=Math.round(68*te+197*(1-te)),B=Math.round(68*te+94*(1-te));
  entropyDiv.style.color='rgb('+R+','+G+','+B+')';

  // ── Parser label ──
  parserDiv.textContent=t>=10?'PARSER: ACTIVE':'';

  // ── Data flow ──
  const src=new THREE.Vector3(-3.3,0.4,0.5),tgt=new THREE.Vector3(-0.1,0.28,0.2);
  dataCubes.forEach(c=>{
    c.userData.p+=c.userData.s*0.016;if(c.userData.p>=1)c.userData.p=0;
    c.position.lerpVectors(src,tgt,c.userData.p);
    c.material.color.set(t<10?0xC62828:0x22C55E);
  });

  // ── Chinese chars → G-CODE ──
  const chars=['数','据','乱','码'],good=['G-CODE','ORDER','CLEAN','OK'];
  ltChars.forEach((d,i)=>{
    d.textContent=t<10?chars[i]:good[i];
    d.style.color=t<10?'#EF4444':'#22C55E';
  });

  // ── Panel spawn (every 0.6s until t=8) ──
  if(t<8&&t-lastSpawn>=0.6){
    spawnPanel(panels.length>0&&(panels.length+1)%3===0);lastSpawn=t;
  }

  // ── Panel physics ──
  panels.forEach(p=>{
    if(!p.userData.fallen){
      p.userData.vY-=0.0008;p.position.y+=p.userData.vY;
      if(p.position.y<=GND+0.05){p.position.y=GND+0.05;p.userData.vY=0;p.userData.fallen=true;}
      // drift toward target X/Z
      p.position.x+=(p.userData.tX-p.position.x)*0.04;
      p.position.z+=(p.userData.tZ-p.position.z)*0.04;
    }
  });

  // ── Rearrange panels (t=10-13s) ──
  if(t>=10&&rearrangeStart<0){
    rearrangeStart=t;
    const rowCount=Math.ceil(panels.length/2);
    panels.forEach((p,i)=>{
      const row=i<rowCount?0:1,col=i<rowCount?i:i-rowCount;
      p.userData.o=p.position.clone();p.userData.at=new THREE.Vector3(-0.8+col*0.35,GND+0.05,row===0?-0.5:0.7);
      p.userData.arranging=true;
    });
  }
  if(rearrangeStart>=0){
    const rp=Math.min(1,(t-rearrangeStart)/3),ep=1-Math.pow(1-rp,3);
    panels.forEach(p=>{
      if(p.userData.arranging&&p.userData.at){
        p.position.lerpVectors(p.userData.o,p.userData.at,ep);
        if(p.userData.df&&rp>0.6){p.userData.df.visible=false;}
        if(rp>0.5){
          const cp=Math.min(1,(rp-0.5)/0.5);
          p.material.color.copy(new THREE.Color(0xE65100).lerp(new THREE.Color(0x22C55E),cp));
        }
      }
    });
  }

  // ── Dollars ──
  if(dollarIdx<dollarAt.length&&t>=dollarAt[dollarIdx]){
    const d=M(box(0.22,0.22,0.1),0xF59E0B);
    d.position.set(3,0.48+(dollarIdx%2)*0.05,0);d.userData={st:t};dollars.push(d);main.add(d);dollarIdx++;
  }
  dollars.forEach(d=>{
    const dt=t-d.userData.st,ty=Math.max(GND+0.1,0.45-dt*0.5);d.position.y=ty;
  });

  // ── Portal (t=8-10s) ──
  if(t>=8){portal.visible=true;portal.scale.setScalar(0.5+0.5*Math.min(1,(t-8)/1.5));portal.rotation.y+=0.01;}
  else portal.visible=false;

  // ── Shockwave (t=8.5-10s) ──
  if(t>=8.5&&t<10){
    shockwave.visible=true;const swt=(t-8.5)/1.5;
    shockwave.scale.setScalar(1+swt*12);shockwave.material.opacity=0.4*(1-swt);
  }else{shockwave.visible=false;}

  // ── Flash (t=9-9.3s) ──
  if(t>=9&&t<9.3){scene.background=new THREE.Color(0xFFFFFF);flashDone=true;}
  else if(t>=9.3&&flashDone){scene.background=new THREE.Color(0x0a0e14);flashDone=false;}

  // ── Operator animations (all the time) ──
  headGrp.rotation.z=0.06*Math.sin(t*1.8);
  mugGrp.rotation.z=0.2*Math.sin(t*2.2);
  steamBoxes.forEach(sb=>{
    const py=sb.userData.by+((t*0.6+sb.userData.ph)%1.3)*0.15;
    sb.position.y=py;sb.material.opacity=0.5*(1-((t*0.6+sb.userData.ph)%1.3));
  });

  // ── Plotter gantry wiggle ──
  if(t>=10&&plGantry)plGantry.position.x=Math.sin(t*0.7)*0.2;

  ren.render(scene,cam);lr.render(scene,cam);
}
init();
</script>
</body>
</html>
