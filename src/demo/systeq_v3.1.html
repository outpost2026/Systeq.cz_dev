<head>

<title>SYSTEQ // V3.1 — Norton Defrag Engine</title>
<style>

<body>
<div id="crtoverlay"></div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}

<script type="module">
import * as THREE from'three';
import{CSS2DRenderer,CSS2DObject}from'three/addons/renderers/CSS2DRenderer.js';

const GND=-0.55,DSK_Y=0.22;
const box=(w,h,d)=>new THREE.BoxGeometry(w,h,d);
const cyl=(r,h,s)=>new THREE.CylinderGeometry(r,r,h,s||8);
const tor=(R,r,rs,ts)=>new THREE.TorusGeometry(R,r,rs||12,ts||24);
const mF=c=>new THREE.MeshStandardMaterial({color:c,flatShading:true,roughness:0.85});
const mE=(c,ei)=>new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:ei||0.5,flatShading:true,roughness:0.7});
const M=(g,c)=>new THREE.Mesh(g,mF(c));

let scene,camera,renderer,lr,main,startT;
let entropyDiv,statusDiv,metricsDiv;
let dataCubes=[],dataLabels=[];
let wallPanels=[],questionMarks=[],qPool=[],bizSymbols=[];
let portalOuter,portalInner,portalVortex=[],portalGroup,shockwave;
let rearrangeStart=-1,lastSpawn=-0.6,lastQSpawn=0,lastBizSpawn=0;
let opTorso,opHead,opBeard,opCap,opLeftArm,opRightArm,opMug,opSteam=[],opLegL,opLegR,operatorGroup;
let plGantry,wallMesh;

const WALL_Z=1.5,WALL_W=5.5,WALL_H=3.2,WALL_GRID_COLS=5,WALL_GRID_ROWS=4;
const CELL_W=WALL_W/WALL_GRID_COLS,CELL_H=WALL_H/WALL_GRID_ROWS;
const BIZ_TEXTS=['ČAS ZPRACOVÁNÍ','MARŽE','ERP','VÝTĚŽ','OPTIMALIZACE','TOOLPATH OK','H2=-0.3','NÁKLAD','VÝNOS','DETERM.'];

function el(txt,fs,cl){
  const d=document.createElement('div');d.className='css-label';
  d.style.cssText=`font-size:${fs};color:${cl}`;d.textContent=txt||'';
  return d;
}
function elH(txt){const d=document.createElement('div');d.className='css-hud';d.textContent=txt;return d;}

/* ── CanvasTexture helpers ── */
function makeCanvasTex(w,h,drawFn){
  const c=document.createElement('canvas');c.width=w;c.height=h;
  drawFn(c.getContext('2d'),w,h);
  const t=new THREE.CanvasTexture(c);t.minFilter=THREE.NearestFilter;t.magFilter=THREE.NearestFilter;
  return t;
}
function monitorTex(){
  return makeCanvasTex(256,160,(x,w,h)=>{
    x.fillStyle='#0A0E14';x.fillRect(0,0,w,h);
    x.strokeStyle='#EF4444';x.lineWidth=3;x.strokeRect(6,6,w-12,h-12);
    x.fillStyle='#E2E8F0';x.font='15px monospace';x.fillText('\u6570\u636E\u5904\u7406\u5931\u8D25',14,34);
    x.fillStyle='#94A3B8';x.font='11px monospace';
    const hex='0123456789ABCDEF';
    for(let r=0;r<5;r++){
      let ln='';for(let c=0;c<6;c++)ln+=hex[Math.floor(Math.random()*16)]+hex[Math.floor(Math.random()*16)]+(c<5?' ':'');
      x.fillText(ln,14,60+r*15);
    }
    x.fillStyle='#EF4444';x.font='bold 12px monospace';x.fillText('FORMAT: UNKNOWN',14,145);
  });
}
function makeQTex(){
  return makeCanvasTex(48,48,(x,w,h)=>{
    x.fillStyle='#000';x.fillRect(0,0,w,h);
    x.fillStyle='#EF4444';x.font='bold 34px monospace';x.textAlign='center';x.textBaseline='middle';
    x.fillText('?',w/2,h/2+2);
    x.strokeStyle='#F87171';x.lineWidth=2;x.strokeRect(3,3,w-6,h-6);
  });
}
function makeWallTex(){
  return makeCanvasTex(440,256,(x,w,h)=>{
    x.fillStyle='#0F172A';x.fillRect(0,0,w,h);
    x.strokeStyle='#0D9488';x.lineWidth=3;x.strokeRect(2,2,w-4,h-4);
    x.strokeStyle='#1E293B';x.lineWidth=1;
    for(let r=0;r<WALL_GRID_ROWS;r++){
      for(let c=0;c<WALL_GRID_COLS;c++){
        const cx=4+c*(w/WALL_GRID_COLS),cy=4+r*(h/WALL_GRID_ROWS);
        const cw=w/WALL_GRID_COLS-8,ch=h/WALL_GRID_ROWS-8;
        x.strokeRect(cx,cy,cw,ch);
        x.fillStyle='#334155';x.font='8px monospace';x.textAlign='center';
        x.fillText(String.fromCharCode(65+r)+(c+1),cx+cw/2,cy+ch/2+3);
      }
    }
    x.fillStyle='#64748B';x.font='bold 11px monospace';x.textAlign='center';
    x.fillText('SYSTEQ DEFRAG ENGINE',w/2,14);
  });
}

function init(){
  scene=new THREE.Scene;scene.background=new THREE.Color(0x0a0e14);
  scene.fog=new THREE.Fog(0x0a0e14,12,30);
  camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,40);
  camera.position.set(0,1.2,8);camera.lookAt(0,0.3,0.5);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  document.body.appendChild(renderer.domElement);
  lr=new CSS2DRenderer;lr.setSize(innerWidth,innerHeight);
  lr.domElement.style.cssText='position:absolute;top:0;pointer-events:none';
  document.body.appendChild(lr.domElement);
  scene.add(new THREE.AmbientLight(0x404060));
  const dl=new THREE.DirectionalLight(0xffeedd,0.8);dl.position.set(2,5,3);scene.add(dl);
  scene.add(new THREE.PointLight(0xFDE047,0.5,6).translateY(0.5));
  main=new THREE.Group;scene.add(main);
  main.add(M(box(8,0.03,7),0x0F172A).translateY(GND-0.015));
  addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);lr.setSize(innerWidth,innerHeight);
  });
  createWall();createPC();createOperator();createPlotter();
  createPortal();createShockwave();createDataFlow();createHUD();
  startT=performance.now();animate();
}

/* ── WALL ── */
function createWall(){
  const wg=new THREE.Group;wg.position.set(0,0.5,WALL_Z);
  wallMesh=new THREE.Mesh(
    new THREE.PlaneGeometry(WALL_W,WALL_H),
    new THREE.MeshStandardMaterial({map:makeWallTex(),roughness:0.9,flatShading:true})
  );
  wg.add(wallMesh);
  const fc=0x334155;
  wg.add(M(box(WALL_W+0.12,0.06,0.08),fc).translateY(WALL_H/2+0.03));
  wg.add(M(box(WALL_W+0.12,0.06,0.08),fc).translateY(-WALL_H/2-0.03));
  wg.add(M(box(0.06,WALL_H+0.12,0.08),fc).translateX(-WALL_W/2-0.03));
  wg.add(M(box(0.06,WALL_H+0.12,0.08),fc).translateX(WALL_W/2+0.03));
  main.add(wg);
}

function wallGridPos(cellIdx){
  const col=cellIdx%WALL_GRID_COLS,row=Math.floor(cellIdx/WALL_GRID_COLS);
  return new THREE.Vector3(
    -WALL_W/2+CELL_W/2+col*CELL_W,
    0.5+WALL_H/2-CELL_H/2-row*CELL_H,
    WALL_Z+0.04
  );
}

/* ── PC ── */
function createPC(){
  const g=new THREE.Group;g.position.set(-3,0,0.5);
  g.add(M(box(0.9,0.04,0.6),0x475569).translateY(DSK_Y+0.02));
  g.add(M(box(0.06,0.55,0.5),0x334155).translateX(-0.38).translateY(DSK_Y-0.28));
  g.add(M(box(0.06,0.55,0.5),0x334155).translateX(0.38).translateY(DSK_Y-0.28));
  const mt=monitorTex(),monM=new THREE.MeshStandardMaterial({map:mt,roughness:0.2});
  g.add(new THREE.Mesh(box(0.55,0.38,0.03),monM).translateY(DSK_Y+0.23));
  g.add(M(box(0.15,0.1,0.15),0x475569).translateY(DSK_Y+0.07).translateZ(0.18));
  g.add(M(box(0.38,0.03,0.12),0x334155).translateY(DSK_Y+0.035).translateZ(0.3));
  g.add(M(box(0.14,0.44,0.38),0x1E293B).translateX(-0.48).translateY(GND+0.22).translateZ(0.3));
  main.add(g);
}

/* ── OPERATOR (enhanced: red cap, red beard, coffee) ── */
function createOperator(){
  operatorGroup=new THREE.Group;
  const ox=-2.1,oz=1.1,btm=GND,st=btm+0.39,wb=st+0.14,tb=wb+0.22,sh=tb+0.35;
  const skin=0xF5D0A9,shirt=0x1E3A5F;

  opLegL=M(cyl(0.09,0.35,8),0x1E293B);opLegL.position.set(ox+0.05,btm+0.175,oz);operatorGroup.add(opLegL);
  opLegR=M(cyl(0.09,0.35,8),0x1E293B);opLegR.position.set(ox+0.17,btm+0.175,oz);operatorGroup.add(opLegR);
  for(const s of[0,0.22]){operatorGroup.add(M(box(0.15,0.32,0.15),skin).translateX(ox+s).translateZ(oz).translateY(btm+0.235));}
  opTorso=new THREE.Mesh(box(0.52,0.42,0.28),mF(shirt));opTorso.position.set(ox+0.11,oz,wb+0.10);operatorGroup.add(opTorso);
  operatorGroup.add(M(box(0.48,0.22,0.28),shirt).translateX(ox+0.11).translateZ(oz).translateY(wb+0.11));

  opLeftArm=new THREE.Group;opLeftArm.position.set(ox-0.2,sh-0.11,oz);
  opLeftArm.add(M(box(0.10,0.24,0.10),shirt));
  opLeftArm.add(M(new THREE.SphereGeometry(0.08,6,6),skin).translateY(-0.16));
  for(let i=-1;i<=1;i+=2)opLeftArm.add(M(box(0.03,0.07,0.03),skin).translateX(i*0.04).translateY(-0.20));
  operatorGroup.add(opLeftArm);

  opRightArm=new THREE.Group;opRightArm.position.set(ox+0.42,sh-0.11,oz);
  opRightArm.add(M(box(0.10,0.24,0.10),shirt));
  opRightArm.add(M(new THREE.SphereGeometry(0.08,6,6),skin).translateY(-0.16));
  for(let i=-1;i<=1;i+=2)opRightArm.add(M(box(0.03,0.07,0.03),skin).translateX(i*0.04).translateY(-0.20));
  operatorGroup.add(opRightArm);

  opHead=new THREE.Group;opHead.position.set(ox+0.11,tb+0.61,oz);
  opHead.add(M(box(0.40,0.40,0.40),skin));
  opHead.add(M(box(0.07,0.05,0.03),0xFFFFFF).translateX(-0.08).translateY(0.05).translateZ(0.21));
  opHead.add(M(box(0.07,0.05,0.03),0xFFFFFF).translateX(0.08).translateY(0.05).translateZ(0.21));
  opHead.add(M(box(0.12,0.03,0.02),0x1E293B).translateY(-0.05).translateZ(0.21));

  opCap=new THREE.Group;opHead.add(opCap);
  opCap.add(M(box(0.44,0.08,0.34),0xD35400).translateY(0.22));
  opCap.add(M(box(0.48,0.04,0.38),0xD35400).translateY(0.27));
  opCap.add(M(box(0.14,0.04,0.22),0x1E293B).translateY(0.19).translateZ(0.21));

  opBeard=new THREE.Mesh(new THREE.ConeGeometry(0.14,0.09,6),mF(0x92400E));
  opBeard.position.set(0,-0.24,0.20);opBeard.rotation.x=0.1;opHead.add(opBeard);
  opBeard.add(M(box(0.26,0.02,0.04),0x92400E).translateY(0.03));

  operatorGroup.add(opHead);

  opMug=new THREE.Group;
  opMug.add(M(cyl(0.09,0.16,8),0x78350F));
  opMug.add(new THREE.Mesh(tor(0.075,0.02,8,16),mF(0x78350F)).translateX(0.09));
  opMug.position.set(ox+0.38,sh-0.20,oz-0.04);operatorGroup.add(opMug);

  for(let i=0;i<3;i++){
    const st=new THREE.Mesh(new THREE.SphereGeometry(0.03,4,4),
      new THREE.MeshBasicMaterial({color:0xE2E8F0,transparent:true,opacity:0.65}));
    st.position.set(0,0.10,0);st.userData={by:0.10,ph:i*0.7};opMug.add(st);opSteam.push(st);
  }
  main.add(operatorGroup);
}

/* ── PLOTTER ── */
function createPlotter(){
  const pl=new THREE.Group;pl.position.set(0,0,0);
  pl.add(M(box(2.5,0.06,1.2),0x334155).translateY(DSK_Y+0.03));
  for(const lx of[-1.1,1.1])for(const lz of[-0.5,0.5])
    pl.add(M(box(0.08,0.46,0.08),0x1E293B).translateX(lx).translateY(GND+0.23).translateZ(lz));
  plGantry=M(box(0.12,0.16,1.32),0x64748B).translateY(DSK_Y+0.11);pl.add(plGantry);
  pl.add(M(box(0.2,0.14,0.2),0x334155).translateY(DSK_Y+0.18));
  pl.add(M(cyl(0.04,0.14,8),0x94A3B8).translateY(DSK_Y+0.02));
  main.add(pl);
}

/* ── PORTAL (dual torus + vortex) ── */
function createPortal(){
  portalGroup=new THREE.Group;portalGroup.position.set(-2,0.4,0.3);
  portalGroup.visible=false;
  portalOuter=new THREE.Mesh(tor(0.35,0.07,16,32),mE(0xFEF3C7,0.35));
  portalOuter.rotation.x=Math.PI/2;portalGroup.add(portalOuter);
  portalInner=new THREE.Mesh(tor(0.22,0.05,12,24),mE(0xFDE047,0.5));
  portalInner.rotation.x=Math.PI/2;portalGroup.add(portalInner);
  for(let i=0;i<16;i++){
    const vx=new THREE.Mesh(new THREE.IcosahedronGeometry(0.03,0),
      new THREE.MeshBasicMaterial({color:0xFFFFFF,transparent:true,opacity:0.55}));
    const a=(i/16)*Math.PI*2;
    vx.position.set(Math.cos(a)*0.28,Math.sin(i*0.3)*0.10,Math.sin(a)*0.28);
    vx.userData={angle:a,speed:0.6+Math.random()*1.2};portalGroup.add(vx);portalVortex.push(vx);
  }
  main.add(portalGroup);
}

/* ── SHOCKWAVE (sphere) ── */
function createShockwave(){
  shockwave=new THREE.Mesh(new THREE.SphereGeometry(0.5,16,16),
    new THREE.MeshBasicMaterial({color:0xFFFFFF,transparent:true,opacity:0.4,side:THREE.DoubleSide}));
  shockwave.position.copy(portalGroup.position);shockwave.visible=false;main.add(shockwave);
}

/* ── DATA FLOW ── */
function createDataFlow(){
  const src=new THREE.Vector3(-3.3,0.4,0.5),tgt=new THREE.Vector3(-0.1,0.28,0.2);
  for(let i=0;i<8;i++){
    const dc=M(box(0.07,0.07,0.07),0xC62828);
    dc.userData={p:i/8,s:0.10+Math.random()*0.06,phase:i};main.add(dc);dataCubes.push(dc);
  }
  const cp=[[-2.6,0.7,0.4],[-2.1,0.62,0.37],[-1.6,0.54,0.33],[-1.1,0.46,0.30],[-0.6,0.38,0.27]];
  ['\u6570','\u636E','\u4E71','\u7801','\u9519'].forEach((t,i)=>{
    const d=el(t,'13px','#EF4444'),obj=new CSS2DObject(d);
    obj.position.set(cp[i][0],cp[i][1],cp[i][2]);main.add(obj);dataLabels.push(obj);
  });
  /* question mark pool */
  for(let i=0;i<12;i++){
    const qTex=makeQTex();
    const qm=new THREE.Mesh(new THREE.PlaneGeometry(0.16,0.16),
      new THREE.MeshBasicMaterial({map:qTex,transparent:true,opacity:0.9,side:THREE.DoubleSide}));
    qm.visible=false;qm.userData={life:0,tex:qTex};qPool.push(qm);main.add(qm);
  }
}

/* ── HUD (Norton Commander style) ── */
function createHUD(){
  entropyDiv=elH('\u250C\u2500 ENTROPY \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502 \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2591 94% \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518');
  statusDiv=elH('\u250C\u2500 STATUS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502 UNSTRUCTURED DATA  \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518');
  metricsDiv=elH('\u250C\u2500 METRICS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502 T:0s | PANELS:0   \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518');
  const g=new THREE.Group;
  g.add(new CSS2DObject(entropyDiv).position.set(0,0,0));
  g.add(new CSS2DObject(statusDiv).position.set(0,-0.1,0));
  g.add(new CSS2DObject(metricsDiv).position.set(0,-0.2,0));
  g.position.set(0,2.7,0);main.add(g);
}

function dosBar(val){
  const f=Math.max(0,Math.min(10,Math.round(val/10)));
  return '\u2588'.repeat(f)+'\u2591'.repeat(10-f);
}

/* ── SPAWN ── */
function spawnWallPanel(defective){
  const col=defective?0xE65100:0x78350F;
  const p=M(box(0.90,0.07,0.55),col);
  p.position.set(0.4,0.2,0.4);
  const targetCell=Math.floor(Math.random()*(WALL_GRID_COLS*WALL_GRID_ROWS));
  const ideal=wallGridPos(targetCell);
  const offset=new THREE.Vector3((Math.random()-0.5)*CELL_W*0.25,(Math.random()-0.5)*CELL_H*0.25,0);
  const target=ideal.clone().add(offset);
  p.userData={
    defective,targetCell,targetPos:target,startPos:p.position.clone(),
    flightTime:0,maxFlight:1.5+Math.random()*1.2,arrived:false,
    defectMesh:null,warningLabel:null,origPos:null,origRot:0,idealTarget:null
  };
  if(defective){
    const df=M(box(0.16,0.05,0.12),0xEF4444);df.position.set(0.35,0.07,0.25);
    df.rotation.z=0.4;p.add(df);p.userData.defectMesh=df;
    const ws=['\u26A0 H2=-0.5','\u26A0 FIXACE!','\u26A0 POSUN','\u26A0 CONFLICT'];
    const wd=el(ws[Math.floor(Math.random()*ws.length)],'8px','#EF4444');
    const wl=new CSS2DObject(wd);wl.position.set(0.4,0.25,0.3);p.add(wl);p.userData.warningLabel=wl;
  }
  wallPanels.push(p);main.add(p);
}

function spawnQuestionMark(){
  const qm=qPool.find(q=>!q.visible);if(!qm)return;
  qm.visible=true;qm.material.opacity=0.9;
  qm.position.set(0.3,GND+0.20,0.3+(Math.random()-0.5)*0.6);
  qm.userData={life:0,velX:(Math.random()-0.5)*0.018,velY:0.008+Math.random()*0.015,velZ:0.015+Math.random()*0.01};
  questionMarks.push(qm);
}

function spawnBizSymbol(){
  const txt=BIZ_TEXTS[Math.floor(Math.random()*BIZ_TEXTS.length)];
  const colors=['#22C55E','#0D9488','#3B82F6','#F59E0B'];
  const c=colors[Math.floor(Math.random()*colors.length)];
  const d=el(txt,'11px',c),obj=new CSS2DObject(d);
  obj.position.set(0.3,GND+0.22,0.4);
  obj.userData={
    st:(performance.now()-startT)/1000,
    tX:(Math.random()-0.5)*3.0,tZ:WALL_Z+0.06+Math.random()*0.3,
    tY:0.3+Math.random()*1.8
  };
  main.add(obj);bizSymbols.push(obj);
}

/* ── ANIMATE ── */
function animate(){
  const t=(performance.now()-startT)/1000;
  const isOrdered=t>=10;

  let entropy;
  if(t<8)entropy=94;else if(t<=22)entropy=94-(t-8)*(88/14);else entropy=6;
  const eVal=Math.round(Math.max(6,entropy));
  let ec;
  if(entropy>=50){const p=(entropy-50)/44;ec=new THREE.Color(0xFDE047).lerp(new THREE.Color(0xEF4444),p);}
  else{const p=(entropy-6)/44;ec=new THREE.Color(0x22C55E).lerp(new THREE.Color(0xFDE047),p);}
  entropyDiv.textContent='\u250C\u2500 ENTROPY \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502 '+dosBar(eVal)+' '+eVal+'% \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518';
  entropyDiv.style.color='#'+ec.getHexString();

  let st,sc;
  if(t<8){st='UNSTRUCTURED DATA '+(Math.floor(t*2)%2===0?'\u2592':' ');sc='#EF4444';}
  else if(t<10){st='DECODING \u26A1 '+(Math.floor(t*4)%2===0?'\u2592\u2592':'\u2591\u2591');sc='#FDE047';}
  else if(t<22){st='DETERMINISTIC OUTPUT \u2592';sc='#22C55E';}
  else{st='ENGINE V20 \u00B7 IDLE \u2592';sc='#22C55E';}
  statusDiv.textContent='\u250C\u2500 STATUS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502 '+st.padEnd(20)+'\u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518';
  statusDiv.style.color=sc;

  const doneCount=wallPanels.filter(p=>p.userData.arrived).length;
  metricsDiv.textContent='\u250C\u2500 METRICS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502 T:'+Math.floor(t)+'s | P:'+doneCount+'/'+wallPanels.length+'\u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518';
  metricsDiv.style.color=t>10?'#22C55E':'#64748B';

  if(t>=9.0&&t<9.4)scene.background=new THREE.Color(0xFFFFFF);
  else if(t>=9.4&&scene.background.getHex()===0xFFFFFF)scene.background=new THREE.Color(0x0a0e14);
  else if(t>10){const bgT=Math.min(1,(t-10)/6);scene.background=new THREE.Color(0x0a0e14).lerp(new THREE.Color(0x0a1218),bgT);}

  /* ── DATA FLOW ── */
  const src=new THREE.Vector3(-3.3,0.4,0.5),tgt=new THREE.Vector3(-0.1,0.28,0.2);
  dataCubes.forEach(c=>{
    c.userData.p+=c.userData.s*0.016;if(c.userData.p>=1)c.userData.p=0;
    if(isOrdered){
      const p=c.userData.p;const base=new THREE.Vector3().lerpVectors(src,tgt,p);
      c.position.x=base.x;c.position.y=base.y+0.10*Math.sin(p*Math.PI*6+c.userData.phase);
      c.position.z=base.z+0.08*Math.sin(p*Math.PI*4+c.userData.phase*0.5);
    }else c.position.lerpVectors(src,tgt,c.userData.p);
    c.material.color.set(isOrdered?0x22C55E:0xC62828);
  });
  const cc=['\u6570','\u636E','\u4E71','\u7801','\u9519'],gt=['ORDER','CLEAN','G-CODE','OK','DATA'];
  dataLabels.forEach((o,i)=>{o.element.textContent=isOrdered?gt[i%gt.length]:cc[i%cc.length];o.element.style.color=isOrdered?'#22C55E':'#EF4444';});

  /* ── QUESTION MARKS ── */
  if(t<8&&t-lastQSpawn>=0.85){spawnQuestionMark();lastQSpawn=t;}
  questionMarks.forEach((qm,i)=>{
    const l=qm.userData.life+0.016;qm.userData.life=l;
    qm.position.x+=qm.userData.velX;qm.position.y+=qm.userData.velY;qm.position.z+=qm.userData.velZ;
    if(l>2.5){qm.material.opacity=0.9*(1-(l-2.5)/1.5);}
    if(l>4)qm.visible=false;
  });
  questionMarks=questionMarks.filter(q=>q.visible);

  /* ── BIZ SYMBOLS ── */
  if(t>=10&&t-lastBizSpawn>=0.9){spawnBizSymbol();lastBizSpawn=t;}
  bizSymbols.forEach((bs,bi)=>{
    const bt=Math.min(1,(t-bs.userData.st)/2.0);
    bs.position.x+=(bs.userData.tX-bs.position.x)*0.04;
    bs.position.z+=(bs.userData.tZ-bs.position.z)*0.04;
    bs.position.y+=(bs.userData.tY-bs.position.y)*0.04;
    if(bt>0.8){bs.element.style.opacity=1-(bt-0.8)/0.2;}
  });
  for(let i=bizSymbols.length-1;i>=0;i--){
    if(bizSymbols[i].element.style.opacity==='0'||(t-bizSymbols[i].userData.st)>2.5){
      main.remove(bizSymbols[i]);bizSymbols.splice(i,1);
    }
  }

  /* ── WALL PANELS: spawn & flight ── */
  if(t<8&&t-lastSpawn>=0.65){
    const cnt=wallPanels.length;
    spawnWallPanel(cnt>0&&(cnt+1)%3===0);lastSpawn=t;
  }
  wallPanels.forEach(p=>{
    if(p.userData.arrived)return;
    p.userData.flightTime+=0.016;
    const ft=p.userData.flightTime/Math.max(p.userData.maxFlight,0.5);
    const ep=Math.min(1,ft),ease=1-Math.pow(1-ep,3);
    p.position.lerpVectors(p.userData.startPos,p.userData.targetPos,ease);
    if(ft>=0.95){p.position.copy(p.userData.targetPos);p.userData.arrived=true;
      p.rotation.z=(Math.random()-0.5)*0.25;
    }
  });

  /* ── DEFRAG / REARRANGE ── */
  if(t>=10&&rearrangeStart<0){
    rearrangeStart=t;
    wallPanels.forEach(p=>{
      p.userData.origPos=p.position.clone();
      p.userData.origRot=p.rotation.z;
      p.userData.idealTarget=wallGridPos(p.userData.targetCell);
    });
  }
  if(rearrangeStart>=0){
    const rp=Math.min(1,(t-rearrangeStart)/3.5);
    const c3=2.70158,ep=rp<1?1+c3*Math.pow(rp-1,3)+1.70158*Math.pow(rp-1,2):1;
    wallPanels.forEach(p=>{
      if(!p.userData.idealTarget)return;
      p.position.lerpVectors(p.userData.origPos,p.userData.idealTarget,ep);
      p.rotation.z=p.userData.origRot*(1-ep);
      if(p.userData.defectMesh&&rp>0.5)p.userData.defectMesh.visible=false;
      if(p.userData.warningLabel&&rp>0.4)p.userData.warningLabel.visible=false;
      if(rp>0.1){
        const cp=Math.min(1,(rp-0.1)/0.9);
        const c=p.userData.defective?new THREE.Color(0xE65100).lerp(new THREE.Color(0x22C55E),cp):new THREE.Color(0x78350F).lerp(new THREE.Color(0x0D9488),cp);
        p.material.color.copy(c);
      }
    });
  }

  /* ── PORTAL ── */
  if(t>=8&&t<10){
    portalGroup.visible=true;const ps=Math.min(1,(t-8)/1.5);
    portalGroup.scale.setScalar(0.3+0.7*ps);
    portalOuter.rotation.y+=0.025;portalInner.rotation.y-=0.035;
    portalOuter.material.emissiveIntensity=0.3+0.4*Math.sin(t*8);
    portalInner.material.emissiveIntensity=0.4+0.5*Math.sin(t*9);
    portalVortex.forEach(v=>{
      v.userData.angle+=v.userData.speed*0.03;
      v.position.x=Math.cos(v.userData.angle)*0.28;
      v.position.z=Math.sin(v.userData.angle)*0.28;
    });
  }else if(t>=10){
    portalGroup.visible=true;portalGroup.scale.setScalar(1);
    portalOuter.material.emissiveIntensity=0.12;portalInner.material.emissiveIntensity=0.15;
    portalOuter.rotation.y+=0.025;portalInner.rotation.y-=0.035;
    portalVortex.forEach(v=>{
      v.userData.angle+=v.userData.speed*0.03;
      v.position.x=Math.cos(v.userData.angle)*0.28;
      v.position.z=Math.sin(v.userData.angle)*0.28;
    });
  }else portalGroup.visible=false;

  /* ── SHOCKWAVE ── */
  if(t>=8.5&&t<9.8){
    shockwave.visible=true;const swt=(t-8.5)/1.3;
    shockwave.scale.setScalar(1+swt*10);shockwave.material.opacity=0.4*(1-swt);
  }else shockwave.visible=false;

  /* ── OPERATOR ── */
  if(t<7){
    opTorso.rotation.x=0.35;
    opHead.rotation.x=0.3;opHead.rotation.z=0.06*Math.sin(t*1.5);
    opLeftArm.rotation.z=0.6;opLeftArm.rotation.x=0.2;
    opRightArm.rotation.x=-0.3;opRightArm.rotation.z=-0.5;
    opMug.position.y=0.35;
  }else if(t<9){
    const lt=Math.min(1,(t-7)/2);
    opTorso.rotation.x=0.35*(1-lt);
    opHead.rotation.x=0.3-lt*0.55;opHead.rotation.z=0;
    opLeftArm.rotation.z=0.6-lt*1.4;opLeftArm.rotation.x=0.2-lt*0.2;
    opRightArm.rotation.x=-0.3+lt*0.5;opRightArm.rotation.z=-0.5+lt*0.9;
    opMug.position.y=0.35;
  }else{
    const rt=Math.min(1,(t-9)/3);
    opTorso.rotation.x=-0.12*rt;
    opHead.rotation.x=-0.22*rt;opHead.rotation.z=0.03*Math.sin(t*0.5)*rt;
    opLeftArm.rotation.z=-1.2*rt;opLeftArm.rotation.x=-0.3*rt;
    opRightArm.rotation.x=0.2*rt;opRightArm.rotation.z=1.0*rt;
    opLegL.rotation.z=0.22*rt;opLegR.rotation.z=-0.22*rt;
    opMug.position.y=0.35+0.04*Math.sin(t*1.8);
  }
  opSteam.forEach(sb=>{
    sb.position.y=sb.userData.by+((t*0.6+sb.userData.ph)%1.3)*0.10;
    sb.material.opacity=0.65*(1-((t*0.6+sb.userData.ph)%1.3));
  });

  if(t>=10&&plGantry)plGantry.position.x=Math.sin(t*0.5)*0.2;

  if(t>22&&Math.random()<0.02){
    const dot=M(box(0.03,0.03,0.03),0x22C55E);dot.position.set(0.3,0.25,0.5);
    main.add(dot);setTimeout(()=>{if(dot.parent)main.remove(dot);},3000);
  }

  renderer.render(scene,camera);lr.render(scene,camera);
  requestAnimationFrame(animate);
}

init();
</script>
</body>
</html>
