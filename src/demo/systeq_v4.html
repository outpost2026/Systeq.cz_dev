function makeHexTex(){
  const c=document.createElement('canvas');c.width=320;c.height=200;
  const x=c.getContext('2d');
  x.fillStyle='#0A0E14';x.fillRect(0,0,320,200);
  x.strokeStyle='#EF4444';x.lineWidth=2;x.strokeRect(4,4,312,192);
  x.fillStyle='#E2E8F0';x.font='14px monospace';
  x.fillText('FORMAT: UNKNOWN',10,22);
  x.fillStyle='#94A3B8';x.font='11px monospace';
  const hexes='0123456789ABCDEF';
  for(let row=0;row<8;row++){
    let line='';
    for(let col=0;col<6;col++)line+=hexes[Math.floor(Math.random()*16)]+hexes[Math.floor(Math.random()*16)]+(col<5?'  ':'');
    x.fillText(line,10,48+row*18);
  }
  x.fillStyle='#EF4444';x.font='bold 11px monospace';x.fillText('DECODING FAILED',10,192);
  for(let sy=0;sy<200;sy+=4){x.fillStyle='rgba(0,0,0,0.08)';x.fillRect(0,sy,320,2);}
  return new THREE.CanvasTexture(c);
}

function entropyDOS(val){
  const f=Math.max(0,Math.min(10,Math.round(val/10)));
  return '\u2588'.repeat(f)+'\u2591'.repeat(10-f);
}

function createToolpath(){
  const TY=GND+0.12,tp=[];
  const ox=-0.8,oy=0.8,oz0=-0.5,oz1=0.5;
  const pts=20;
  for(let i=0;i<=pts;i++){const s=i/pts;tp.push(new THREE.Vector3(ox+(oy-ox)*s,TY,oz0));}
  for(let i=0;i<=pts;i++){const s=i/pts;tp.push(new THREE.Vector3(oy,TY,oz0+(oz1-oz0)*s));}
  for(let i=0;i<=pts;i++){const s=i/pts;tp.push(new THREE.Vector3(oy-(oy-ox)*s,TY,oz1));}
  for(let i=0;i<=pts;i++){const s=i/pts;tp.push(new THREE.Vector3(ox,TY,oz1-(oz1-oz0)*s));}
  for(let i=0;i<16;i++){const a=i/16*Math.PI*2;tp.push(new THREE.Vector3(Math.cos(a)*0.3,TY,Math.sin(a)*0.25));}
  for(let i=0;i<8;i++){
    const z=oz0+(i/7)*(oz1-oz0);
    tp.push(new THREE.Vector3(-0.5+(i%2)*0.2,TY,z));
    tp.push(new THREE.Vector3(0.5-(i%2)*0.2,TY,z));
  }
  const verts=[];for(let i=0;i<tp.length-1;i++)verts.push(tp[i].x,tp[i].y,tp[i].z,tp[i+1].x,tp[i+1].y,tp[i+1].z);
  const geo=new THREE.BufferGeometry;geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(verts),3));
  const pathLine=new THREE.LineSegments(geo,new THREE.LineBasicMaterial({color:0x3B82F6,transparent:true,opacity:0.25}));
  main.add(pathLine);
}

function bezt(p0,p1,p2,t){
  const mt=1-t;
  return new THREE.Vector3(mt*mt*p0.x+2*mt*t*p1.x+t*t*p2.x,mt*mt*p0.y+2*mt*t*p1.y+t*t*p2.y,mt*mt*p0.z+2*mt*t*p1.z+t*t*p2.z);
}
function bezierLinear(p0,p1,p2,t){
  if(t<0.5){const lt=t*2;return new THREE.Vector3().lerpVectors(p0,p1,lt);}
  else{const lt=(t-0.5)*2;return new THREE.Vector3().lerpVectors(p1,p2,lt);}
}

function createDataFlow(){
  const burstCount=PARTICLE_COUNT*BURST_PER;
  for(let i=0;i<burstCount;i++){
    const b=new THREE.Mesh(new THREE.SphereGeometry(0.025,4,4),
      new THREE.MeshBasicMaterial({color:0xFFFFFF,transparent:true,opacity:0}));
    b.visible=false;b.userData={life:0};burstPool.push(b);main.add(b);
  }
  for(let i=0;i<PARTICLE_COUNT;i++){
    const ico=new THREE.Mesh(new THREE.IcosahedronGeometry(0.1,0),mF(0xC62828));
    ico.scale.set(0.7+Math.random()*0.8,0.7+Math.random()*1.1,0.7+Math.random()*0.8);
    const cube=new THREE.Mesh(box(0.12,0.12,0.12),mF(0x0D9488));cube.visible=false;
    const ch=charsPool[Math.floor(Math.random()*charsPool.length)];
    const lbl=el(ch+' '+hexPool(),'9px','#EF4444');const lblObj=new CSS2DObject(lbl);
    const trailGeo=new THREE.BufferGeometry;
    const trailVerts=new Float32Array(9);const trailColors=new Float32Array(9);
    trailGeo.setAttribute('position',new THREE.BufferAttribute(trailVerts,3));
    trailGeo.setAttribute('color',new THREE.BufferAttribute(trailColors,3));
    const trailLine=new THREE.Line(trailGeo,new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:0.5}));
    const particle={
      ico,cube,label:lblObj,trail:trailLine,trailVerts,trailColors,
      progress:Math.random(),speed:0.05+Math.random()*0.07,
      morphTime:-1,split:false,phase:Math.random()*6.28,burstIdx:i*BURST_PER,
      zOff:(Math.random()-0.5)*0.4,midOff:(Math.random()-0.5)*0.3
    };
    main.add(ico);main.add(cube);main.add(lblObj);main.add(trailLine);
    dataParticles.push(particle);
  }
  for(let i=0;i<PARTICLE_COUNT;i++){
    const cube=new THREE.Mesh(box(0.12,0.12,0.12),mF(0x3B82F6));cube.visible=false;
    const lblObj=new CSS2DObject(el('','9px','#0D9488'));lblObj.visible=false;
    const trailGeo=new THREE.BufferGeometry;
    const trailVerts=new Float32Array(9);const trailColors=new Float32Array(9);
    trailGeo.setAttribute('position',new THREE.BufferAttribute(trailVerts,3));
    trailGeo.setAttribute('color',new THREE.BufferAttribute(trailColors,3));
    const trailLine=new THREE.Line(trailGeo,new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:0.4}));
    const clone={
      ico:null,cube,label:lblObj,trail:trailLine,trailVerts,trailColors,
      progress:-0.5,speed:0.06+Math.random()*0.04,
      morphTime:-1,split:true,phase:Math.random()*6.28,burstIdx:-1
    };
    main.add(cube);main.add(lblObj);main.add(trailLine);
    dataClones.push(clone);
  }
}

function init(){
  scene=new THREE.Scene;scene.background=new THREE.Color(0x0a0e14);
  scene.fog=new THREE.Fog(0x0a0e14,12,26);

  camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,1000);
  camera.position.set(0,3.0,9.5);
  camera.lookAt(0.8,0.3,0);

  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  document.body.appendChild(renderer.domElement);

  lr=new CSS2DRenderer;lr.setSize(innerWidth,innerHeight);
  lr.domElement.style.cssText='position:absolute;top:0;pointer-events:none';
  document.body.appendChild(lr.domElement);

  controls=new OrbitControls(camera,renderer.domElement);
  controls.target.set(0.8,0.3,0);controls.enableDamping=true;controls.dampingFactor=0.08;
  controls.autoRotate=true;controls.autoRotateSpeed=0.3;
  controls.enablePan=false;controls.minDistance=5;controls.maxDistance=18;
  controls.enabled=false;controls.maxPolarAngle=Math.PI*0.65;

  scene.add(new THREE.AmbientLight(0x404060));
  const dl=new THREE.DirectionalLight(0xffffff,1.0);
  dl.position.set(2,8,4);scene.add(dl);
  plotterLight=new THREE.PointLight(0xffaa66,0.7,8);plotterLight.position.set(0,0.3,0);scene.add(plotterLight);

  main=new THREE.Group;scene.add(main);

  floorGrid=new THREE.GridHelper(10,20,0x1E293B,0x0F172A);
  floorGrid.translateY(-0.55);main.add(floorGrid);

  const floorGeo=new THREE.PlaneGeometry(10,8);
  const floorMat=new THREE.MeshStandardMaterial({
    color:0x0A0E14,metalness:0.8,roughness:0.2,transparent:true,opacity:0.3,flatShading:false
  });
  const floor=new THREE.Mesh(floorGeo,floorMat);
  floor.rotation.x=-Math.PI/2;floor.translateY(-0.56);main.add(floor);

  createPC();createPlotter();createLibrary();createOperator();createPortal();createShockwaves();createDataFlow();createHUD();createToolpath();
  scrapTex1=makeScrapTex('SCRAP');scrapTex2=makeScrapTex('\u2717');scrapTex3=makeScrapTex('BAD');

  addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);lr.setSize(innerWidth,innerHeight);
  });

  setInterval(()=>{const t=(performance.now()-startT)/1000;if(t<9)updateHexTex();},1000);

  startT=performance.now();animate();
}

function animate(){
  const t=(performance.now()-startT)/1000;

  if(t>12&&!controls.enabled){
    controls.enabled=true;controls.autoRotateSpeed=0.3;
  }
  if(controls.enabled)controls.update();

  if(portalOuter.visible){
    portalOuter.rotation.y+=0.02;portalInner.rotation.y-=0.03;
  }

  if(t<7){
    operatorTorso.rotation.x=0.4;
    operatorHead.rotation.x=0.3;operatorHead.rotation.z=0.08*Math.sin(t*1.5);
    operatorLeftArm.rotation.z=0.8;operatorLeftArm.rotation.x=0.3;
    operatorRightArm.rotation.z=-0.8;operatorRightArm.rotation.x=0.3;
  }else if(t<9){
    const lt=Math.min(1,(t-7)/2);
    operatorTorso.rotation.x=0.4*(1-lt);
    operatorHead.rotation.x=0.3-lt*0.6;operatorHead.rotation.z=0;
    operatorLeftArm.rotation.z=0.8-lt*1.4;operatorLeftArm.rotation.x=0.3-lt*0.2;
    operatorRightArm.rotation.z=-0.8+lt*1.4;operatorRightArm.rotation.x=0.3-lt*0.2;
  }else if(t<20){
    const rt=Math.min(1,(t-9)/3);
    operatorTorso.rotation.x=-0.1*rt;
    operatorHead.rotation.x=-0.25*rt;operatorHead.rotation.z=0.04*Math.sin(t*0.5)*rt;
    operatorLeftArm.rotation.z=-1.2*rt;operatorLeftArm.rotation.x=-0.3*rt;
    operatorRightArm.rotation.z=1.2*rt;operatorRightArm.rotation.x=-0.3*rt;
  }else{
    operatorTorso.rotation.x=-0.1;
    operatorHead.rotation.x=-0.25;operatorHead.rotation.z=0.04*Math.sin(t*0.5);
    operatorLeftArm.rotation.z=-1.2;operatorLeftArm.rotation.x=-0.3;
    operatorRightArm.rotation.z=1.2;operatorRightArm.rotation.x=-0.3;
    operatorMug.position.y=0.3+0.05*Math.sin(t*1.8);
  }
  operatorSteam.forEach(sb=>{
    sb.position.y=0.12+((t*0.6+sb.userData.ph)%1.3)*0.12;
    sb.material.opacity=0.6*(1-((t*0.6+sb.userData.ph)%1.3));
  });

  if(t>=8&&t<10){
    portalOuter.userData.group.visible=true;portalOuter.userData.group.scale.setScalar(0.5+0.5*Math.min(1,(t-8)/1.5));
    portalOuter.material.emissiveIntensity=0.3+0.4*Math.sin(t*8);
    portalInner.material.emissiveIntensity=0.4+0.5*Math.sin(t*9);
  }else if(t>=10){
    portalOuter.userData.group.visible=true;portalOuter.userData.group.scale.setScalar(1);
    portalOuter.material.emissiveIntensity=0.15;portalInner.material.emissiveIntensity=0.2;
  }else{portalOuter.userData.group.visible=false;}

  if(t>=8.5&&t<9.1){shockwave1.visible=true;const sw=(t-8.5)/0.6;shockwave1.scale.setScalar(1+sw*6);shockwave1.material.opacity=0.3*(1-sw);}
  else shockwave1.visible=false;
  if(t>=8.8&&t<9.4){shockwave2.visible=true;const sw=(t-8.8)/0.6;shockwave2.scale.setScalar(1+sw*5);shockwave2.material.opacity=0.2*(1-sw);}
  else shockwave2.visible=false;

  if(t>=8.5&&t<9.5&&floorGrid){
    const gp=Math.min(1,(t-8.5)/0.4);
    floorGrid.material.color.set(new THREE.Color(0x1E293B).lerp(new THREE.Color(0xFDE047),gp));
  }
  if(t>=9.5&&floorGrid&&floorGrid.material.color.getHex()===0xFDE047){
    floorGrid.material.color.set(0x1E293B);
  }

  const chaosSrc=new THREE.Vector3(-3.5,0.55,0.3);
  const chaosMid=new THREE.Vector3(-1.5,0.8,0.5);
  const chaosTgt=new THREE.Vector3(0,0.28,0.8);
  const libTgt=new THREE.Vector3(3.5,0.4,0);
  const isActive=t>=8,isOrdered=t>=10;
  let timeScale=1;
  if(t>=9&&t<10){const dTime=(t-9);timeScale=0.3+(dTime*dTime)*1.0;if(timeScale>1.3)timeScale=1.3;}

  const colorCha=new THREE.Color(0xC62828),colorOrd=new THREE.Color(0x0D9488),colorClone=new THREE.Color(0x3B82F6);

  dataParticles.forEach(p=>{
    let spd=p.speed*timeScale*0.016;
    p.progress+=spd;if(p.progress>=1){p.progress-=1;p.morphTime=-1;}
    const srcP=new THREE.Vector3(chaosSrc.x,chaosSrc.y,chaosSrc.z+p.zOff);
    const midP=new THREE.Vector3(chaosMid.x+0.5*p.midOff,chaosMid.y,chaosMid.z+p.zOff*0.7);
    const tgtP=new THREE.Vector3(chaosTgt.x,chaosTgt.y,chaosTgt.z+p.zOff*0.6);
    const pos=isOrdered?bezierLinear(srcP,midP,tgtP,p.progress):bezt(srcP,midP,tgtP,p.progress);
    const col=isOrdered?colorOrd:colorCha;
    let bp=null;
    p.ico.position.copy(pos);p.ico.material.color.copy(col);
    p.cube.position.copy(pos);p.cube.visible=p.morphTime>=0;
    p.ico.visible=!p.cube.visible;
    p.label.position.copy(new THREE.Vector3(pos.x,pos.y+0.15,pos.z));
    if(isOrdered){
      const oi=Math.floor((p.phase+Math.random()*0.2)%orderLabels.length);
      p.label.element.textContent=orderLabels[oi];p.label.element.style.color='#0D9488';
    }else{p.label.element.textContent=charsPool[Math.floor(p.phase)%charsPool.length]+' 0x'+'0123456789ABCDEF'[Math.floor(p.phase*10)%16]+Math.floor(Math.random()*10);p.label.element.style.color='#EF4444';}

    p.trailVerts[0]=pos.x-0.02;p.trailVerts[1]=pos.y;p.trailVerts[2]=pos.z;
    if(p.progress-spd*3>=0){
      const bp2=isOrdered?bezierLinear(chaosSrc,chaosMid,chaosTgt,Math.max(0,p.progress-spd*3)):bezt(chaosSrc,chaosMid,chaosTgt,Math.max(0,p.progress-spd*3));
      p.trailVerts[3]=bp2.x;p.trailVerts[4]=bp2.y;p.trailVerts[5]=bp2.z;
      if(p.progress-spd*6>=0){
        bp=isOrdered?bezierLinear(chaosSrc,chaosMid,chaosTgt,Math.max(0,p.progress-spd*6)):bezt(chaosSrc,chaosMid,chaosTgt,Math.max(0,p.progress-spd*6));
        p.trailVerts[6]=bp.x;p.trailVerts[7]=bp.y;p.trailVerts[8]=bp.z;
      }else{p.trailVerts[6]=p.trailVerts[3];p.trailVerts[7]=p.trailVerts[4];p.trailVerts[8]=p.trailVerts[5];}
    }else{p.trailVerts[3]=p.trailVerts[0];p.trailVerts[4]=p.trailVerts[1];p.trailVerts[5]=p.trailVerts[2];p.trailVerts[6]=p.trailVerts[0];p.trailVerts[7]=p.trailVerts[1];p.trailVerts[8]=p.trailVerts[2];}
    p.trailColors[0]=col.r;p.trailColors[1]=col.g;p.trailColors[2]=col.b;
    p.trailColors[3]=col.r*0.5;p.trailColors[4]=col.g*0.5;p.trailColors[5]=col.b*0.5;
    p.trailColors[6]=0;p.trailColors[7]=0;p.trailColors[8]=0;
    p.trail.geometry.attributes.position.needsUpdate=true;
    p.trail.geometry.attributes.color.needsUpdate=true;

    if(t>=9&&p.morphTime<0){
      const distFromPortal=Math.abs(p.progress-0.5);
      const dTime=t-9;
      const progThreshold=dTime*0.35;
      if(distFromPortal<progThreshold){p.morphTime=t;
        for(let bi=0;bi<BURST_PER;bi++){
          const idx=p.burstIdx+bi;
          if(idx<burstPool.length){
            const b=burstPool[idx];
            b.position.copy(pos);b.visible=true;
            b.material.opacity=0.8;
            const angle=bi/BURST_PER*Math.PI*2;
            const phi=(bi%BURST_PER)/(BURST_PER-1)*Math.PI;
            b.userData={life:0,dir:new THREE.Vector3(Math.cos(angle)*Math.sin(phi),Math.cos(phi),Math.sin(angle)*Math.sin(phi)).normalize()};
          }
        }
      }
    }
  });

  dataClones.forEach(c=>{
    if(!isOrdered){c.cube.visible=false;c.label.visible=false;return;}
    let spd=c.speed*0.016;c.progress+=spd;
    if(c.progress>1){c.progress=-0.5;c.cube.visible=false;c.label.visible=false;}
    else if(c.progress>=0){
      c.cube.visible=true;c.label.visible=true;
      const pos=bezt(chaosMid,new THREE.Vector3(1,0.5,0.3),libTgt,Math.min(1,c.progress));
      c.cube.position.copy(pos);c.cube.material.color.copy(colorClone);
      c.label.position.copy(new THREE.Vector3(pos.x,pos.y+0.15,pos.z));
      c.label.element.textContent=orderLabels[Math.floor(c.phase)%orderLabels.length];c.label.element.style.color='#3B82F6';
      c.trailVerts[0]=pos.x-0.02;c.trailVerts[1]=pos.y;c.trailVerts[2]=pos.z;
      if(c.progress-c.speed*3>=0){
        const bp2=bezt(chaosMid,new THREE.Vector3(1,0.5,0.3),libTgt,Math.max(0,c.progress-c.speed*3));
        c.trailVerts[3]=bp2.x;c.trailVerts[4]=bp2.y;c.trailVerts[5]=bp2.z;
      }else{c.trailVerts[3]=c.trailVerts[0];c.trailVerts[4]=c.trailVerts[1];c.trailVerts[5]=c.trailVerts[2];}
      c.trailVerts[6]=c.trailVerts[0];c.trailVerts[7]=c.trailVerts[1];c.trailVerts[8]=c.trailVerts[2];
      c.trailColors[0]=colorClone.r;c.trailColors[1]=colorClone.g;c.trailColors[2]=colorClone.b;
      c.trailColors[3]=colorClone.r*0.3;c.trailColors[4]=colorClone.g*0.3;c.trailColors[5]=colorClone.b*0.3;
      c.trailColors[6]=0;c.trailColors[7]=0;c.trailColors[8]=0;
      c.trail.geometry.attributes.position.needsUpdate=true;
      c.trail.geometry.attributes.color.needsUpdate=true;
    }
  });

  burstPool.forEach(b=>{
    if(!b.visible)return;
    b.userData.life+=0.016;
    const l=b.userData.life;
    const d=b.userData.dir;
    b.position.x+=d.x*0.04;b.position.y+=d.y*0.04;b.position.z+=d.z*0.04;
    b.material.opacity=0.8*(1-l*4);
    if(l>0.25){b.visible=false;b.material.opacity=0;}
  });

  if(t<8&&t-lastPanelSpawn>=0.6){
    const cnt=panels.length;
    const defective=cnt>0&&(cnt+1)%3===0;
    spawnPanel(defective,Math.floor(Math.random()*3));
    lastPanelSpawn=t;
  }
  panels.forEach(p=>{
    if(!p.userData.fallen){
      if(t>=7&&t<8)p.userData.vY-=0.0002;else p.userData.vY-=0.0008;
      p.position.y+=p.userData.vY;
      if(p.position.y<=GND+0.025){p.position.y=GND+0.025;p.userData.vY=0;p.userData.fallen=true;}
      p.position.x+=(p.userData.tX-p.position.x)*0.04;
      p.position.z+=(p.userData.tZ-p.position.z)*0.04;
    }
    if(p.userData.fallen&&!p.userData.healing){
      p.rotation.z=p.userData.rotZ;
    }
  });

  if(t>=10&&rearrangeStart<0){
    rearrangeStart=t;
    const oldCount=panels.length;
    const half=Math.ceil(oldCount/2);
    panels.forEach((p,i)=>{
      p.userData.old=true;
      const row=i<half?0:1,col=i<half?i:i-half;
      p.userData.o=p.position.clone();
      p.userData.oRot=p.rotation.z;
      p.userData.at=new THREE.Vector3(-2.0+col*Math.min(0.25,1.8/(half-1||1)),GND+0.025,row===0?-0.8:0.8);
    });
  }
  if(rearrangeStart>=0){
    const rp=Math.min(1,(t-rearrangeStart)/3);
    const o1=1.70158,c3=o1+1,ep=rp<1?1+c3*Math.pow(rp-1,3)+o1*Math.pow(rp-1,2):1;
    panels.forEach(p=>{
      if(!p.userData.at||!p.userData.old)return;
      p.position.lerpVectors(p.userData.o,p.userData.at,ep);
      p.rotation.z=p.userData.oRot*(1-ep);
      if(p.userData.defectMeshes.length&&rp>0.5){
        p.userData.defectMeshes.forEach(dm=>{dm.position.y-=0.03;if(dm.position.y+dm.position.y*0.5<GND)dm.visible=false;});
      }
      if(p.userData.warningLabel&&rp>0.4)p.userData.warningLabel.visible=false;
      if(rp>0.35){
        const cp=Math.min(1,(rp-0.35)/0.65);
        const c=new THREE.Color(0xC62828).lerp(new THREE.Color(0x22C55E),cp);
        p.material.color.copy(c);
      }
    });
  }

  if(t>=10&&t-lastPanelSpawn>=1.2&&newPanels.length<7){
    spawnOrderedPanel();lastPanelSpawn=t;
  }
  newPanels.forEach((p,i)=>{
    if(p.userData.popIn>0){
      p.userData.popIn-=0.016;
      const s=Math.min(1,1-p.userData.popIn/0.2);
      const es=1-Math.pow(1-s,3);
      p.scale.setScalar(es);
      if(p.userData.popIn<=0){p.scale.setScalar(1);p.userData.popIn=0;}
    }
    const ty=GND+0.025+newPanels.indexOf(p)*0.06;
    p.position.x+=(1.5-p.position.x)*0.08;
    p.position.z+=(1.0-p.position.z)*0.08;
    p.position.y+=(ty-p.position.y)*0.06;
    if(newPanels.indexOf(p)>=7)p.visible=false;
  });

  if(t>8.1&&t<8.5&&!guruShown){
    guruShown=true;showGuruTex();
    setTimeout(()=>{if(monitorMesh){monitorTex&&monitorTex.dispose();monitorTex=makeHexTex();monitorMesh.material.map=monitorTex;monitorMesh.material.needsUpdate=true;}},400);
  }

  if(t>=13&&t-lastDollarSpawn>=1.2&&dollars.length<DOLLAR_MAX){
    spawnDollar();lastDollarSpawn=t;
  }
  if(t>22&&t-lastDollarSpawn>=3&&dollars.length<DOLLAR_MAX){
    spawnDollar();lastDollarSpawn=t;
  }
  dollars.forEach((d,i)=>{
    const dt=t-d.userData.st;
    d.userData.vy-=0.0003;
    d.position.y+=d.userData.vy;
    d.position.x+=d.userData.vx;d.position.z+=d.userData.vz;
    if(d.position.y<=GND+0.1)d.position.y=GND+0.1;
    d.rotation.x+=d.userData.rotSpeed;d.rotation.y+=d.userData.rotSpeed*0.7;
    d.userData.life=dt;
    if(dt>8){d.material.transparent=true;d.material.opacity=Math.max(0,1-(dt-8)/2);}
  });
  for(let i=dollars.length-1;i>=0;i--){
    if(dollars[i].userData.life>10){main.remove(dollars[i]);dollars.splice(i,1);}
  }

  const rTime=Math.min(1,(t-10)/10);
  if(rTime>=0){
    const R=Math.round(340*rTime),S=Math.round(23-21*rTime),T=Math.round(187*rTime);
    libraryROI.textContent='ROI: +'+R+'%';libraryROI.style.color='#'+new THREE.Color(0x64748B).lerp(new THREE.Color(0x22C55E),rTime).getHexString();
    libraryScrap.textContent='SCRAP: '+S+'%';libraryScrap.style.color='#'+new THREE.Color(0xef4444).lerp(new THREE.Color(0x22C55E),rTime).getHexString();
    libraryThroughput.textContent='THROUGHPUT: +'+T+'%';libraryThroughput.style.color='#'+new THREE.Color(0x64748B).lerp(new THREE.Color(0x0D9488),rTime).getHexString();
  }
  if(t>=10){
    libraryBlockedCubes.forEach(cb=>{
      const ct=Math.min(1,(t-10)/4);
      const cc=new THREE.Color(0x475569).lerp(new THREE.Color(0x3B82F6),ct);cb.material.color.copy(cc);
      cb.scale.setScalar(1+0.05*Math.sin(t*3));
    });
  }

  if(t>=8&&isOrdered)plotterLight.color.set(0x22C55E);
  else if(t>=8)plotterLight.color.set(0xFDE047);
  else plotterLight.color.set(0xffaa66);

  let entropy;
  if(t<8)entropy=94;else if(t<=22)entropy=94-(t-8)*(88/14);else entropy=6;
  const eVal=Math.round(Math.max(6,entropy));
  let ec;
  if(entropy>=50)ec=new THREE.Color(0xFDE047).lerp(new THREE.Color(0xEF4444),(entropy-50)/44);
  else ec=new THREE.Color(0x22C55E).lerp(new THREE.Color(0xFDE047),(entropy-6)/44);
  entropyDiv.textContent='ENTROPY: '+eVal+'% '+entropyDOS(eVal);
  entropyDiv.style.color='#'+ec.getHexString();

  let st,sc;
  if(t<8){st='STATUS: UNSTRUCTURED DATA';sc='#EF4444';}
  else if(t<10){st=Math.floor(t*4)%2===0?'STATUS: DECODING \u26A1':'STATUS: DECODING';sc='#FDE047';}
  else{st='STATUS: DETERMINISTIC OUTPUT';sc='#22C55E';}
  if(t>22){st='ENGINE V20 \u00B7 IDLE';}
  statusDiv.textContent=st;statusDiv.style.color=sc;

  const doneCount=panels.filter(p=>p.userData.at!=null&&!p.userData.defective).length+newPanels.length;
  const totalP=panels.length+newPanels.length;
  const savedMin=Math.floor(t*0.4);
  metricsDiv.textContent='TIME: '+Math.floor(t)+'s | DONE: '+doneCount+'/'+totalP+' | SAVE: '+savedMin+' min';
  metricsDiv.style.color=t>10?'#22C55E':'#64748B';

  if(t>=9.2&&t<9.4)scene.background=new THREE.Color(0xFFFFFF);
  else if(t>=9.4&&scene.background.getHex()===0xFFFFFF)scene.background=new THREE.Color(0x0a0e14);
  else if(t>10){const bgT=Math.min(1,(t-10)/6);scene.background=new THREE.Color(0x0a0e14).lerp(new THREE.Color(0x0a1218),bgT);}

  renderer.render(scene,camera);lr.render(scene,camera);
  requestAnimationFrame(animate);
}

init();
</script>
</body>
</html>
