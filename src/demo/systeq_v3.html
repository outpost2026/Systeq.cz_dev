<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SYSTEQ // CNC Entropy Reduction — V3</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e14;overflow:hidden;font-family:'JetBrains Mono',monospace}
canvas{display:block}
.css-label{font-family:'JetBrains Mono',monospace;white-space:nowrap;text-shadow:0 0 8px rgba(0,0,0,0.95);pointer-events:none;transition:color 0.3s}
</style>
</head>
<body>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import{CSS2DRenderer,CSS2DObject}from'three/addons/renderers/CSS2DRenderer.js';

const GND=-0.55,DSK_Y=0.22;
const box=(w,h,d)=>new THREE.BoxGeometry(w,h,d);
const cyl=(r,h,s)=>new THREE.CylinderGeometry(r,r,h,s||8);
const tor=(R,r,rs,ts)=>new THREE.TorusGeometry(R,r,rs||8,ts||16);
const mF=c=>new THREE.MeshStandardMaterial({color:c,flatShading:true});
const mE=(c,ei)=>new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:ei||0.5,flatShading:true});
const M=(g,c)=>new THREE.Mesh(g,mF(c));

let scene,camera,renderer,lr,main,startT;
let entropyDiv,statusDiv;
let dataCubes=[],chineseLabels=[],hexLabels=[];
let panels=[],dollars=[],metrics=[];
let portal,shockwave,rearrangeStart=-1;
let lastSpawn=-0.6,dollarSpawned=0,metricSpawned=0;
let operatorHead,operatorLeftArm,operatorRightArm,plGantry,operatorGroup;

const METRIC_TEXTS=['3:14 min','0.12 m\u00B2','57 429 mm','137 elem','~260 K\u010D'];

function el(txt,fs,cl){
  const d=document.createElement('div');d.className='css-label';
  d.style.cssText=`font-size:${fs};color:${cl}`;d.textContent=txt||'';
  return d;
}

function init(){
  scene=new THREE.Scene;scene.background=new THREE.Color(0x0a0e14);
  camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,30);
  camera.position.set(0,1.2,8);camera.lookAt(0,0.2,0);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  document.body.appendChild(renderer.domElement);
  lr=new CSS2DRenderer;lr.setSize(innerWidth,innerHeight);
  lr.domElement.style.cssText='position:absolute;top:0;pointer-events:none';
  document.body.appendChild(lr.domElement);
  scene.add(new THREE.AmbientLight(0x404060));
  const dl=new THREE.DirectionalLight(0xffeedd,0.8);dl.position.set(2,5,3);scene.add(dl);
  scene.add(new THREE.PointLight(0xFDE047,0.5,6).translateY(0.5));
  main=new THREE.Group;scene.add(main);
  main.add(M(box(8,0.03,6),0x0F172A).translateY(GND-0.015));
  addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);lr.setSize(innerWidth,innerHeight);
  });
  createPC();createOperator();createPlotter();createLibrary();
  createPortal();createShockwave();createDataFlow();createEntropyLabel();
  startT=performance.now();animate();
}

function createPC(){
  const g=new THREE.Group;g.position.set(-3,0,0.5);
  g.add(M(box(0.9,0.04,0.6),0x475569).translateY(DSK_Y+0.02));
  g.add(M(box(0.06,0.55,0.5),0x334155).translateX(-0.38).translateY(DSK_Y-0.28));
  g.add(M(box(0.06,0.55,0.5),0x334155).translateX(0.38).translateY(DSK_Y-0.28));
  const mt=monitorTex(),monM=new THREE.MeshStandardMaterial({map:mt,roughness:0.2});
  g.add(new THREE.Mesh(box(0.55,0.38,0.03),monM).translateY(DSK_Y+0.23));
  g.add(M(box(0.15,0.1,0.15),0x475569).translateY(DSK_Y+0.07).translateZ(0.18));
  g.add(M(box(0.38,0.03,0.12),0x334155).translateY(DSK_Y+0.035).translateZ(0.3));
  g.add(M(box(0.14,0.44,0.38),0x1E293B).translateX(-0.48).translateY(GND+0.22).translateZ(0.3));
  main.add(g);
}

function monitorTex(){
  const c=document.createElement('canvas');c.width=256;c.height=160;
  const x=c.getContext('2d');
  x.fillStyle='#0A0E14';x.fillRect(0,0,256,160);
  x.strokeStyle='#EF4444';x.lineWidth=3;x.strokeRect(6,6,244,148);
  x.fillStyle='#E2E8F0';x.font='15px monospace';x.fillText('\u6570\u636E\u5904\u7406\u5931\u8D25',14,34);
  x.fillStyle='#94A3B8';x.font='11px monospace';
  x.fillText('E8 A3 6F  7E 2B 4C',14,60);x.fillText('A1 B2 C3  D4 E5 F6',14,78);x.fillText('B0 5F 9C  A8 1D 3E',14,96);
  x.fillStyle='#EF4444';x.font='bold 12px monospace';x.fillText('FORMAT: UNKNOWN',14,140);
  return new THREE.CanvasTexture(c);
}

function createOperator(){
  operatorGroup=new THREE.Group;
  const ox=-2.1,oz=1.1,btm=GND,st=btm+0.39,wb=st+0.14,tb=wb+0.22,sh=tb+0.35;
  for(const s of[0,0.22]){
    operatorGroup.add(M(box(0.19,0.07,0.22),0x1E293B).translateX(ox+s).translateZ(oz).translateY(btm+0.035));
    operatorGroup.add(M(box(0.15,0.32,0.15),0xF5D0A9).translateX(ox+s).translateZ(oz).translateY(btm+0.235));
    operatorGroup.add(M(box(0.17,0.14,0.17),0x1E3A5F).translateX(ox+s).translateZ(oz).translateY(st+0.07));
  }
  operatorGroup.add(M(box(0.48,0.22,0.28),0x1E3A5F).translateX(ox+0.11).translateZ(oz).translateY(wb+0.11));
  operatorGroup.add(M(box(0.54,0.42,0.32),0x1E3A5F).translateX(ox+0.11).translateZ(oz).translateY(tb+0.21));
  operatorLeftArm=new THREE.Group;
  operatorLeftArm.position.set(ox-0.2,sh-0.11,oz);
  operatorLeftArm.add(M(box(0.12,0.22,0.12),0x1E3A5F));operatorLeftArm.add(M(box(0.10,0.22,0.10),0x1E3A5F).translateY(-0.11));
  operatorLeftArm.add(M(box(0.09,0.09,0.09),0xF5D0A9).translateY(-0.26));operatorGroup.add(operatorLeftArm);
  operatorRightArm=new THREE.Group;
  operatorRightArm.position.set(ox+0.42,sh-0.11,oz);
  operatorRightArm.add(M(box(0.12,0.22,0.12),0x1E3A5F));
  const rag=new THREE.Group;rag.position.set(0,-0.11,0);rag.rotation.z=-0.7;
  rag.add(M(box(0.10,0.24,0.10),0x1E3A5F).translateY(0.12));rag.add(M(box(0.09,0.09,0.09),0xF5D0A9).translateY(0.28));
  operatorRightArm.add(rag);operatorGroup.add(operatorRightArm);
  operatorHead=new THREE.Group;operatorHead.position.set(ox+0.11,tb+0.61,oz);
  operatorHead.add(M(box(0.40,0.40,0.40),0xF5D0A9));
  operatorHead.add(M(box(0.07,0.05,0.03),0xFFFFFF).translateX(-0.08).translateY(0.05).translateZ(0.21));
  operatorHead.add(M(box(0.07,0.05,0.03),0xFFFFFF).translateX(0.08).translateY(0.05).translateZ(0.21));
  operatorHead.add(M(box(0.14,0.04,0.03),0x1E293B).translateY(-0.06).translateZ(0.21));
  operatorHead.add(M(box(0.44,0.10,0.32),0x1E293B).translateY(0.24));
  operatorHead.add(M(box(0.22,0.04,0.16),0x0D9488).translateY(0.22).translateZ(0.20));
  operatorHead.add(M(box(0.07,0.05,0.03),0xD35400).translateY(0.28).translateZ(0.21));
  operatorGroup.add(operatorHead);
  const mug=new THREE.Group;mug.add(M(cyl(0.09,0.18,8),0x78350F));
  mug.add(new THREE.Mesh(tor(0.075,0.02),mF(0x78350F)).translateX(0.09));
  mug.position.set(ox+0.38,sh-0.22,oz-0.04);operatorGroup.add(mug);
  main.add(operatorGroup);
}

function createPlotter(){
  const pl=new THREE.Group;pl.position.set(0,0,0);
  pl.add(M(box(2.5,0.06,1.2),0x334155).translateY(DSK_Y+0.03));
  for(const lx of[-1.1,1.1])for(const lz of[-0.5,0.5])pl.add(M(box(0.08,0.46,0.08),0x1E293B).translateX(lx).translateY(GND+0.23).translateZ(lz));
  plGantry=M(box(0.12,0.16,1.32),0x64748B).translateY(DSK_Y+0.11);pl.add(plGantry);
  pl.add(M(box(0.2,0.14,0.2),0x334155).translateY(DSK_Y+0.18));
  pl.add(M(cyl(0.04,0.18,8),0x94A3B8).translateY(DSK_Y+0.02));main.add(pl);
}

function createLibrary(){
  const lib=new THREE.Group;lib.position.set(3,0,0);
  lib.add(M(box(0.08,0.8,0.6),0x475569).translateX(-0.4));lib.add(M(box(0.08,0.8,0.6),0x475569).translateX(0.4));
  for(let i=0;i<3;i++)lib.add(M(box(0.88,0.04,0.6),0x64748B).translateY(GND+0.15+i*0.22));main.add(lib);
}

function createPortal(){
  portal=new THREE.Mesh(new THREE.TorusGeometry(0.3,0.06,16,24),mE(0xFEF3C7,0.35));
  portal.position.set(-2,0.4,0.3);portal.visible=false;main.add(portal);
}

function createShockwave(){
  shockwave=new THREE.Mesh(new THREE.SphereGeometry(0.5,16,16),
    new THREE.MeshBasicMaterial({color:0xFFFFFF,transparent:true,opacity:0.4,side:THREE.DoubleSide}));
  shockwave.position.copy(portal.position);shockwave.visible=false;main.add(shockwave);
}

function createDataFlow(){
  const src=new THREE.Vector3(-3.3,0.4,0.5),tgt=new THREE.Vector3(-0.1,0.28,0.2);
  for(let i=0;i<6;i++){const dc=M(box(0.06,0.06,0.06),0xC62828);
    dc.userData={p:i/6,s:0.12+Math.random()*0.04,phase:i};main.add(dc);dataCubes.push(dc);}
  const cp=[[-2.6,0.7,0.4],[-1.9,0.6,0.35],[-1.2,0.5,0.3],[-0.5,0.4,0.25]];
  ['\u6570','\u636E','\u4E71','\u7801'].forEach((t,i)=>{
    const d=el(t,'14px','#EF4444'),obj=new CSS2DObject(d);
    obj.position.set(cp[i][0],cp[i][1],cp[i][2]);main.add(obj);chineseLabels.push(obj);});
  const hp=[[-2.8,0.55,0.45],[-2.2,0.45,0.4],[-1.5,0.35,0.35],[-0.8,0.3,0.3]];
  ['A7','3F','BC','E8'].forEach((t,i)=>{
    const d=el(t,'11px','#EF4444'),obj=new CSS2DObject(d);
    obj.position.set(hp[i][0],hp[i][1],hp[i][2]);main.add(obj);hexLabels.push(obj);});
}

function createEntropyLabel(){
  entropyDiv=el('ENTROPY: 94% \u25B0\u25B0\u25B0\u25B0\u25B0\u25B0\u25B0\u25B0\u25B0\u25B1','14px','#EF4444');
  statusDiv=el('STATUS: UNSTRUCTURED DATA','10px','#64748B');
  const g=new THREE.Group;g.add(new CSS2DObject(entropyDiv).translateY(2.8));
  g.add(new CSS2DObject(statusDiv).translateY(2.55));main.add(g);
}

function spawnPanel(defective){
  const p=M(box(1.2,0.1,0.8),defective?0xE65100:0x78350F);
  p.position.set(0.5,0.2,0.6);
  p.userData={defective,tX:0.2+Math.random()*1.0,tZ:0.3+(Math.random()-0.5)*1.6,vY:0,fallen:false,o:null,at:null,defectMesh:null,warningLabel:null};
  if(defective){
    const df=M(box(0.2,0.05,0.15),0xEF4444);df.position.set(0.5,0.1,0.3);p.add(df);p.userData.defectMesh=df;
    const ws=['\u26A0 H2=-0.5','\u26A0 FIXACE!','\u26A0 POSUN','\u26A0 CONFLICT'];
    const wd=el(ws[Math.floor(Math.random()*ws.length)],'9px','#EF4444');
    const wl=new CSS2DObject(wd);wl.position.set(0.5,0.3,0.4);p.add(wl);p.userData.warningLabel=wl;
  }
  panels.push(p);main.add(p);
}

function spawnDollar(){
  const d=M(box(0.2,0.2,0.1),0xF59E0B);
  d.position.set(3,0.9,0);d.userData={st:(performance.now()-startT)/1000};
  dollars.push(d);main.add(d);
}

let metricIdx=0;
function spawnMetric(){
  if(metricIdx>=METRIC_TEXTS.length)return;
  const txt=METRIC_TEXTS[metricIdx++],d=el(txt,'12px','#22C55E'),obj=new CSS2DObject(d);
  obj.position.set(3,0.85,0.15);obj.userData={st:(performance.now()-startT)/1000};
  main.add(obj);metrics.push(obj);
}

function entropyBar(val){
  const f=Math.max(0,Math.min(10,Math.round(val/10)));
  return '\u25B0'.repeat(f)+'\u25B1'.repeat(10-f);
}

function animate(){
  const t=(performance.now()-startT)/1000;

  let entropy;
  if(t<8)entropy=94;else if(t<=22)entropy=94-(t-8)*(88/14);else entropy=6;
  const eVal=Math.round(entropy);
  let ec;
  if(entropy>=50){const p=(entropy-50)/44;ec=new THREE.Color(0xFDE047).lerp(new THREE.Color(0xEF4444),p);}
  else{const p=(entropy-6)/44;ec=new THREE.Color(0x22C55E).lerp(new THREE.Color(0xFDE047),p);}
  entropyDiv.textContent='ENTROPY: '+eVal+'% '+entropyBar(eVal);
  entropyDiv.style.color='#'+ec.getHexString();

  let st,sc;
  if(t<8){st='STATUS: UNSTRUCTURED DATA';sc='#EF4444';}
  else if(t<10){st=Math.floor(t*4)%2===0?'STATUS: DECODING \u26A1':'STATUS: DECODING';sc='#FDE047';}
  else if(t<22){st='STATUS: DETERMINISTIC OUTPUT';sc='#22C55E';}
  else{st='ENGINE V20 \u00B7 IDLE  |  Residual: 6%';sc='#22C55E';}
  statusDiv.textContent=st;statusDiv.style.color=sc;

  if(t>=9&&t<9.3)scene.background=new THREE.Color(0xFFFFFF);
  else if(t>=9.3&&scene.background.getHex()===0xFFFFFF)scene.background=new THREE.Color(0x0a0e14);
  else if(t>10){const bgT=Math.min(1,(t-10)/6);scene.background=new THREE.Color(0x0a0e14).lerp(new THREE.Color(0x0a1218),bgT);}

  const src=new THREE.Vector3(-3.3,0.4,0.5),tgt=new THREE.Vector3(-0.1,0.28,0.2),ordered=t>=10;
  dataCubes.forEach(c=>{
    c.userData.p+=c.userData.s*0.016;if(c.userData.p>=1)c.userData.p=0;
    if(ordered){
      const p=c.userData.p;const base=new THREE.Vector3().lerpVectors(src,tgt,p);
      c.position.x=base.x;c.position.y=base.y+0.08*Math.sin(p*Math.PI*6+c.userData.phase);
      c.position.z=base.z+0.06*Math.sin(p*Math.PI*4+c.userData.phase*0.5);
    }else c.position.lerpVectors(src,tgt,c.userData.p);
    c.material.color.set(ordered?0x22C55E:0xC62828);
  });

  const cc=['\u6570','\u636E','\u4E71','\u7801'],gt=['G-CODE','ORDER','CLEAN','OK'];
  chineseLabels.forEach((o,i)=>{o.element.textContent=ordered?gt[i]:cc[i];o.element.style.color=ordered?'#22C55E':'#EF4444';});
  const hx=['A7','3F','BC','E8'];
  hexLabels.forEach((o,i)=>{o.element.textContent=ordered?'':hx[i];o.element.style.color=ordered?'#22C55E':'#EF4444';});

  if(t<8&&t-lastSpawn>=0.6){const cnt=panels.length;spawnPanel(cnt>0&&(cnt+1)%3===0);lastSpawn=t;}
  panels.forEach(p=>{
    if(!p.userData.fallen){
      if(t>=7&&t<8)p.userData.vY-=0.0002;else p.userData.vY-=0.0008;
      p.position.y+=p.userData.vY;
      if(p.position.y<=GND+0.05){p.position.y=GND+0.05;p.userData.vY=0;p.userData.fallen=true;}
      p.position.x+=(p.userData.tX-p.position.x)*0.04;
      p.position.z+=(p.userData.tZ-p.position.z)*0.04;
    }
  });

  if(t>=10&&rearrangeStart<0){
    rearrangeStart=t;
    panels.forEach((p,i)=>{
      const row=i<7?0:1,col=i<7?i:i-7;
      p.userData.o=p.position.clone();p.userData.at=new THREE.Vector3(-0.8+col*0.35,GND+0.05,row===0?-1:1);
    });
  }
  if(rearrangeStart>=0){
    const rp=Math.min(1,(t-rearrangeStart)/4),ep=1-Math.pow(1-rp,3);
    panels.forEach(p=>{
      if(!p.userData.at)return;
      p.position.lerpVectors(p.userData.o,p.userData.at,ep);
      if(p.userData.defectMesh&&rp>0.6)p.userData.defectMesh.visible=false;
      if(p.userData.warningLabel&&rp>0.5)p.userData.warningLabel.visible=false;
      if(rp>0.4){
        const cp=Math.min(1,(rp-0.4)/0.6);
        const c=new THREE.Color(0xE65100).lerp(new THREE.Color(0x22C55E),cp);
        const base=new THREE.Color(0x78350F).lerp(new THREE.Color(0x22C55E),cp);
        p.material.color.copy(p.userData.defectMesh?c:base);
      }
    });
  }

  if(t>=8&&t<10){
    portal.visible=true;const ps=Math.min(1,(t-8)/1.5);
    portal.scale.setScalar(0.5+0.5*ps);portal.rotation.y+=0.02;portal.rotation.x+=0.01;
    portal.material.emissiveIntensity=0.3+0.4*Math.sin(t*8);
  }else if(t>=10){portal.visible=true;portal.material.emissiveIntensity=0.15;}
  else portal.visible=false;

  if(t>=8.5&&t<10){shockwave.visible=true;const swt=(t-8.5)/1.5;
    shockwave.scale.setScalar(1+swt*12);shockwave.material.opacity=0.4*(1-swt);}
  else shockwave.visible=false;

  if(t>=16&&dollarSpawned<5&&t>=16+dollarSpawned){spawnDollar();dollarSpawned++;}
  dollars.forEach(d=>{const dt=t-d.userData.st;d.position.y=Math.max(GND+0.1,0.9-dt*0.6);});

  if(t>=16.5&&metricSpawned<METRIC_TEXTS.length&&t>=16.5+metricSpawned){spawnMetric();metricSpawned++;}
  metrics.forEach(m=>{const dt=t-m.userData.st;m.position.y=Math.max(GND+0.25,0.85-dt*0.5);});

  if(t<8){
    operatorHead.rotation.x=0.3;operatorHead.rotation.z=0.08*Math.sin(t*1.5);operatorHead.rotation.y=0;
    operatorLeftArm.rotation.z=0.1;operatorLeftArm.rotation.x=0;
    operatorRightArm.rotation.x=-0.3;operatorRightArm.rotation.z=0;
  }else if(t<10){
    const lt=Math.min(1,(t-8)/1.5);
    operatorHead.rotation.x=0.3-lt*0.5;operatorHead.rotation.z=0;
    operatorLeftArm.rotation.z=0.1-lt*0.3;
    operatorRightArm.rotation.x=-0.3+lt*0.5;
  }else{
    const rt=Math.min(1,(t-10)/3);
    operatorHead.rotation.x=-0.15*rt;operatorHead.rotation.z=0.04*Math.sin(t*0.5)*rt;operatorHead.rotation.y=0.1*rt;
    operatorLeftArm.rotation.z=-0.2*rt;operatorLeftArm.rotation.x=0.15*rt;
    operatorRightArm.rotation.x=0.2*rt;operatorRightArm.rotation.z=-0.1*rt;
  }

  if(t>=10&&plGantry)plGantry.position.x=Math.sin(t*0.5)*0.2;

  if(t>22&&Math.random()<0.02){
    const dot=M(box(0.03,0.03,0.03),0x22C55E);dot.position.set(0.3,0.25,0.5);
    main.add(dot);setTimeout(()=>{if(dot.parent)main.remove(dot);},3000);
  }

  renderer.render(scene,camera);lr.render(scene,camera);
  requestAnimationFrame(animate);
}

init();
</script>
</body>
</html>
