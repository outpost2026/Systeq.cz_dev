<script type="module">
import * as THREE from'three';
import{CSS2DRenderer,CSS2DObject}from'three/addons/renderers/CSS2DRenderer.js';
import{OrbitControls}from'three/addons/controls/OrbitControls.js';

const GND=-0.55;
const WALL_Z=2.2,WALL_W=6,WALL_H=3.5,WALL_Y=0.8,WALL_GRID_COLS=5,WALL_GRID_ROWS=4;
const CELL_W=WALL_W/WALL_GRID_COLS,CELL_H=WALL_H/WALL_GRID_ROWS;

/* ── EGA 16-colour palette ── */
const EGA={BLACK:0x000000,BLUE:0x0000AA,GREEN:0x00AA00,CYAN:0x00AAAA,RED:0xAA0000,
  MAGENTA:0xAA00AA,BROWN:0xAA5500,LTGRAY:0xAAAAAA,DKGRAY:0x555555,LTBLUE:0x5555FF,
  LTGREEN:0x55FF55,LTCYAN:0x55FFFF,LTRED:0xFF5555,LTMAGENTA:0xFF55FF,
  YELLOW:0xFFFF55,WHITE:0xFFFFFF};

const mF=c=>new THREE.MeshStandardMaterial({color:c,flatShading:true,roughness:0.9});
const mE=(c,ei)=>new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:ei||0.6,flatShading:true,roughness:0.7});
const box=(w,h,d)=>new THREE.BoxGeometry(w,h,d);
const cyl=(r,h,s)=>new THREE.CylinderGeometry(r,r,h,s||8);
const tor=(R,r,rs,ts)=>new THREE.TorusGeometry(R,r,rs||12,ts||24);
const M=(g,c)=>new THREE.Mesh(g,mF(c));

let scene,camera,renderer,lr,startT,controls;
let main,wallMesh,wallGridGroup,plGantry,plSpindle,plLight;
let portalOuter,portalInner,portalVortex=[],portalGroup,shockwaves=[];
let operatorGroup,opTorso,opHead,opBeard,opCap,opLeftArm,opRightArm,opMug,opSteam=[],opLegL,opLegR;
let dataParticles=[],dataClones=[],burstPool=[],BURST_PER=8,PARTICLE_COUNT=24;
let wallPanels=[],orderedPanels=[],questionMarks=[],qPool=[],lastPanelSpawn=-0.8,lastQSpawn=0;
let dollars=[],dollarTex,lastDollarSpawn=0,DOLLAR_MAX=8,defragStart=-1,defragDone=false;
let entropyDiv,statusDiv,metricsDiv;
let guruShown=false,monitorTex,monitorMesh;

const CNC_LABELS=['ČAS','MARŽE','VÝTĚŽ','H2','ERP','NÁSTROJ','TOOL','OK','OPT','Kč'];

function el(txt,cl='css-hud'){const d=document.createElement('div');d.className=cl;d.textContent=txt;return d;}

/* ── CanvasTexture tools ── */
function makeCanvasTex(w,h,drawFn){
  const c=document.createElement('canvas');c.width=w;c.height=h;
  drawFn(c.getContext('2d'),w,h);
  const t=new THREE.CanvasTexture(c);t.minFilter=THREE.NearestFilter;t.magFilter=THREE.NearestFilter;
  return t;
}

function makeScrapTex(txt='SCRAP'){
  return makeCanvasTex(256,192,(x,w,h)=>{
    x.fillStyle='#AA0000';x.fillRect(0,0,w,h);
    x.fillStyle='#000000';x.font='bold 48px monospace';x.textAlign='center';
    x.fillText(txt,w/2,h/2+16);
    x.strokeStyle='#FFFF55';x.lineWidth=6;x.strokeRect(8,8,w-16,h-16);
  });
}

function makeHexTex(){
  return makeCanvasTex(256,144,(x,w,h)=>{
    x.fillStyle='#000000';x.fillRect(0,0,w,h);
    x.strokeStyle='#AA0000';x.lineWidth=2;x.strokeRect(2,2,w-4,h-4);
    x.fillStyle='#AAAAAA';x.font='12px monospace';
    x.fillText('\u6570\u636E\u4E71\u7801\u9519 ERROR',8,18);
    const hexes='0123456789ABCDEF';
    for(let r=0;r<6;r++){
      let ln='';for(let c=0;c<7;c++)ln+=hexes[Math.floor(Math.random()*16)]+hexes[Math.floor(Math.random()*16)]+' ';
      x.fillStyle='#555555';x.font='10px monospace';x.fillText(ln,8,34+r*17);
    }
    x.fillStyle='#AA0000';x.font='bold 11px monospace';x.fillText('PARSE: FAILED',8,138);
  });
}

function makeGuruTex(){
  return makeCanvasTex(256,144,(x,w,h)=>{
    x.fillStyle='#000000';x.fillRect(0,0,w,h);
    x.fillStyle='#AA0000';x.font='bold 18px monospace';x.textAlign='center';
    x.fillText('GURU MEDITATION',w/2,50);
    x.fillStyle='#FF5555';x.font='bold 30px monospace';
    x.fillText('#80000003',w/2,95);
    x.fillStyle='#AAAAAA';x.font='11px monospace';
    x.fillText('AMIGA 1985',w/2,120);
  });
}

function makeDollarTex(){
  return makeCanvasTex(64,64,(x,w,h)=>{
    x.fillStyle='#FFFF55';x.fillRect(0,0,w,h);
    x.strokeStyle='#AA5500';x.lineWidth=3;x.strokeRect(4,4,w-8,h-8);
    x.fillStyle='#AA5500';x.font='bold 32px monospace';x.textAlign='center';x.textBaseline='middle';
    x.fillText('$',w/2,h/2+2);
    x.fillStyle='#AA5500';x.font='7px monospace';x.fillText('SYSTEQ',w/2,12);
  });
}

function makeQuestionTex(){
  return makeCanvasTex(48,48,(x,w,h)=>{
    x.fillStyle='#000000';x.fillRect(0,0,w,h);
    x.fillStyle='#AA0000';x.font='bold 32px monospace';x.textAlign='center';x.textBaseline='middle';
    x.fillText('?',w/2,h/2+2);
    x.strokeStyle='#FF5555';x.lineWidth=2;x.strokeRect(2,2,w-4,h-4);
  });
}

function makeWallTex(){
  return makeCanvasTex(512,300,(x,w,h)=>{
    x.fillStyle='#000000';x.fillRect(0,0,w,h);
    x.strokeStyle='#00AAAA';x.lineWidth=4;x.strokeRect(2,2,w-4,h-4);
    x.strokeStyle='#555555';x.lineWidth=1;
    for(let r=0;r<WALL_GRID_ROWS;r++){
      for(let c=0;c<WALL_GRID_COLS;c++){
        const cx=4+c*(w/WALL_GRID_COLS),cy=4+r*(h/WALL_GRID_ROWS);
        const cw=w/WALL_GRID_COLS-8,ch=h/WALL_GRID_ROWS-8;
        x.strokeRect(cx,cy,cw,ch);
        x.fillStyle='#00AA00';x.font='7px monospace';x.textAlign='center';
        x.fillText(String.fromCharCode(65+r)+(c+1),cx+cw/2,cy+ch/2+3);
      }
    }
    x.fillStyle='#FFFF55';x.font='bold 12px monospace';x.textAlign='center';
    x.fillText('NORTON SPEED DISK v5.0 - SYSTEQ DEFRAG ENGINE',w/2,16);
  });
}

function makeParamTex(label,value,variant){
  return makeCanvasTex(256,96,(x,w,h)=>{
    const bg=variant===0?'#000000':variant===1?'#000000':'#000000';
    x.fillStyle=bg;x.fillRect(0,0,w,h);
    const bc=variant===0?'#00AA00':variant===1?'#AA5500':'#AA0000';
    x.strokeStyle=bc;x.lineWidth=3;x.strokeRect(3,3,w-6,h-6);
    x.fillStyle='#AAAAAA';x.font='9px monospace';x.textAlign='left';
    x.fillText(label,10,28);
    x.fillStyle=variant===0?'#55FF55':variant===1?'#FFFF55':'#FF5555';
    x.font='bold 18px monospace';x.fillText(value,10,62);
  });
}

/* ── Scene initialization ── */
function createScene(){
  scene=new THREE.Scene;scene.background=new THREE.Color(EGA.BLACK);
  scene.fog=new THREE.Fog(EGA.BLACK,10,28);

  camera=new THREE.PerspectiveCamera(52,innerWidth/innerHeight,0.1,100);
  camera.position.set(0,1.5,6.5);
  camera.lookAt(0,0.8,1.5);

  renderer=new THREE.WebGLRenderer({antialias:false});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(1);
  document.body.appendChild(renderer.domElement);

  lr=new CSS2DRenderer;lr.setSize(innerWidth,innerHeight);
  lr.domElement.style.cssText='position:absolute;top:0;pointer-events:none';
  document.body.appendChild(lr.domElement);

  controls=new OrbitControls(camera,renderer.domElement);
  controls.target.set(0,0.8,1.5);controls.enableDamping=true;controls.dampingFactor=0.08;
  controls.autoRotate=true;controls.autoRotateSpeed=0.2;
  controls.enablePan=false;controls.minDistance=5;controls.maxDistance=14;
  controls.enabled=false;controls.maxPolarAngle=Math.PI*0.65;

  scene.add(new THREE.AmbientLight(EGA.DKGRAY));
  const dl=new THREE.DirectionalLight(EGA.LTGRAY,0.8);dl.position.set(2,6,4);scene.add(dl);
  plLight=new THREE.PointLight(EGA.YELLOW,0.8,8);plLight.position.set(0,0.3,-1.5);scene.add(plLight);

  main=new THREE.Group;scene.add(main);

  const floorGeo=new THREE.PlaneGeometry(10,10);
  const floor=new THREE.Mesh(floorGeo,new THREE.MeshStandardMaterial({color:EGA.BLACK,metalness:0.3,roughness:0.8,flatShading:true}));
  floor.rotation.x=-Math.PI/2;floor.translateY(GND-0.01);main.add(floor);

  const gridH=new THREE.GridHelper(10,20,EGA.DKGRAY,EGA.BLACK);
  gridH.translateY(GND);main.add(gridH);

  addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);lr.setSize(innerWidth,innerHeight);
  });
}

/* ── WALL — the defrag grid ── */
function createWall(){
  const wg=new THREE.Group;wg.position.set(0,WALL_Y,WALL_Z);

  const wallGeo=new THREE.PlaneGeometry(WALL_W,WALL_H);
  wallMesh=new THREE.Mesh(wallGeo,new THREE.MeshStandardMaterial({map:makeWallTex(),roughness:0.85,flatShading:true}));
  wg.add(wallMesh);

  const frame=new THREE.Mesh(
    new THREE.BoxGeometry(WALL_W+0.15,0.08,0.1),
    mF(EGA.LTGRAY)
  );frame.position.set(0,WALL_H/2+0.04,0);wg.add(frame);
  const frameBot=new THREE.Mesh(
    new THREE.BoxGeometry(WALL_W+0.15,0.08,0.1),
    mF(EGA.LTGRAY)
  );frameBot.position.set(0,-WALL_H/2-0.04,0);wg.add(frameBot);
  const frameL=new THREE.Mesh(
    new THREE.BoxGeometry(0.08,WALL_H+0.16,0.1),
    mF(EGA.LTGRAY)
  );frameL.position.set(-WALL_W/2-0.04,0,0);wg.add(frameL);
  const frameR=new THREE.Mesh(
    new THREE.BoxGeometry(0.08,WALL_H+0.16,0.1),
    mF(EGA.LTGRAY)
  );frameR.position.set(WALL_W/2+0.04,0,0);wg.add(frameR);

  wallGridGroup=new THREE.Group;wg.add(wallGridGroup);
  main.add(wg);
}

function wallGridPos(cellIdx){
  const col=cellIdx%WALL_GRID_COLS;
  const row=Math.floor(cellIdx/WALL_GRID_COLS);
  return new THREE.Vector3(
    -WALL_W/2+CELL_W/2+col*CELL_W,
    WALL_Y+WALL_H/2-CELL_H/2-row*CELL_H,
    WALL_Z+0.04
  );
}

/* ── PC ── */
function createPC(){
  const g=new THREE.Group;g.position.set(-2.5,0.2,-1.5);
  g.add(M(box(1.0,0.06,0.7),EGA.DKGRAY).translateY(0.03));
  for(const lx of[-0.42,0.42])for(const lz of[-0.28,0.28])

  g.add(M(box(0.5,0.04,0.2),EGA.DKGRAY).translateY(0.05).translateZ(0.40));

function updateMonitorTex(tex){if(monitorMesh&&monitorTex){monitorTex.dispose();monitorTex=tex;monitorMesh.material.map=monitorTex;monitorMesh.material.needsUpdate=true;}}

    pl.add(M(box(0.08,0.35,0.08),EGA.BLUE).translateX(lx).translateY(GND+0.175).translateZ(lz));

/* ── OPERATOR ── */
function createOperator(){
  operatorGroup=new THREE.Group;operatorGroup.position.set(-2.2,-0.2,-1.0);
  const skin=0xF5D0A9,shirt=EGA.BLUE;

  opLegL=M(cyl(0.09,0.45,8),EGA.DKGRAY);opLegL.position.set(-0.08,-0.15,0);operatorGroup.add(opLegL);

  opHead=new THREE.Group;opHead.position.set(0,0.85,0);

/* ── PORTAL ── */
function createPortal(){
  portalGroup=new THREE.Group;portalGroup.position.set(-1.5,0.6,-0.5);
  portalGroup.visible=false;

  portalOuter=new THREE.Mesh(tor(0.55,0.07,16,32),mE(EGA.YELLOW,0.4));
  portalOuter.rotation.x=Math.PI/2;portalGroup.add(portalOuter);
  portalInner=new THREE.Mesh(tor(0.35,0.05,12,24),mE(EGA.WHITE,0.5));
  portalInner.rotation.x=Math.PI/2;portalGroup.add(portalInner);

  for(let i=0;i<20;i++){
    const vx=new THREE.Mesh(new THREE.IcosahedronGeometry(0.04,0),
      new THREE.MeshBasicMaterial({color:EGA.WHITE,transparent:true,opacity:0.6}));
    const a=(i/20)*Math.PI*2;
    vx.position.set(Math.cos(a)*0.45,Math.sin(i*0.3)*0.15,Math.sin(a)*0.45);
    vx.userData={angle:a,speed:0.5+Math.random()*1.5};portalGroup.add(vx);portalVortex.push(vx);
  }
  main.add(portalGroup);

/* ── SHOCKWAVES as EGA rings ── */
function createShockwaves(){
  for(let i=0;i<3;i++){
    const r=[0.3,0.5,0.7][i],col=[EGA.WHITE,EGA.YELLOW,EGA.CYAN][i];
    const ring=new THREE.Mesh(new THREE.RingGeometry(r-0.04,r,32),
      new THREE.MeshBasicMaterial({color:col,side:THREE.DoubleSide,transparent:true,opacity:0.6}));
    ring.position.copy(portalGroup.position);
    ring.visible=false;main.add(ring);shockwaves.push(ring);
  }
}

/* ── DATA FLOW ── */
function createDataFlow(){
  const burstTotal=PARTICLE_COUNT*BURST_PER;
  for(let i=0;i<burstTotal;i++){
    const b=new THREE.Mesh(new THREE.SphereGeometry(0.02,4,4),
      new THREE.MeshBasicMaterial({color:EGA.WHITE,transparent:true,opacity:0}));
    b.visible=false;b.userData={life:0};burstPool.push(b);main.add(b);
  }
  for(let i=0;i<PARTICLE_COUNT;i++){
    const ico=new THREE.Mesh(new THREE.IcosahedronGeometry(0.08,0),mF(EGA.RED));
    ico.scale.set(0.7+Math.random()*0.9,0.7+Math.random()*1.2,0.7+Math.random()*0.9);
    const cube=new THREE.Mesh(box(0.11,0.11,0.11),mF(EGA.GREEN));cube.visible=false;
    const lbl=el('\u6570\u636E\u4E71\u7801 0xA7');const lblObj=new CSS2DObject(lbl);
    const trailGeo=new THREE.BufferGeometry;
    const tv=new Float32Array(15),tc=new Float32Array(15);
    trailGeo.setAttribute('position',new THREE.BufferAttribute(tv,3));
    trailGeo.setAttribute('color',new THREE.BufferAttribute(tc,3));
    const trailLine=new THREE.Line(trailGeo,new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:0.7}));
    const pz=(Math.random()-0.5)*0.4,my=(Math.random()-0.5)*0.3;
    const p={
      ico,cube,label:lblObj,trail:trailLine,trailVerts:tv,trailColors:tc,
      progress:Math.random(),speed:0.05+Math.random()*0.07,morphTime:-1,split:false,
      phase:Math.random()*6.28,burstIdx:i*BURST_PER,zOff:pz,midOff:my
    };
    main.add(ico);main.add(cube);main.add(lblObj);main.add(trailLine);
    dataParticles.push(p);
  }
  for(let i=0;i<PARTICLE_COUNT;i++){
    const cube=new THREE.Mesh(box(0.11,0.11,0.11),mF(EGA.LTBLUE));cube.visible=false;
    const lblObj=new CSS2DObject(el('OK'));lblObj.visible=false;
    const trailGeo=new THREE.BufferGeometry;
    const tv=new Float32Array(15),tc=new Float32Array(15);
    trailGeo.setAttribute('position',new THREE.BufferAttribute(tv,3));
    trailGeo.setAttribute('color',new THREE.BufferAttribute(tc,3));
    const trailLine=new THREE.Line(trailGeo,new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:0.5}));
    const c={
      ico:null,cube,label:lblObj,trail:trailLine,trailVerts:tv,trailColors:tc,
      progress:-0.5,speed:0.05+Math.random()*0.05,morphTime:-1,split:true,
      phase:Math.random()*6.28,burstIdx:-1
    };
    main.add(cube);main.add(lblObj);main.add(trailLine);
    dataClones.push(c);
  }
  /* question mark pool */
  for(let i=0;i<15;i++){
    const qTex=makeQuestionTex();
    const qm=new THREE.Mesh(new THREE.PlaneGeometry(0.2,0.2),
      new THREE.MeshBasicMaterial({map:qTex,transparent:true,opacity:0.9,side:THREE.DoubleSide}));
    qm.visible=false;qm.userData={life:0,tex:qTex};qPool.push(qm);main.add(qm);
  }
}

/* ── TOOLPATH ── */
function createToolpath(){
  const TY=GND+0.05,Z=-1.5;
  const pts=24,tp=[];
  const ox=-0.7,oy=0.7,oz0=-0.4,oz1=0.4;
  for(let i=0;i<=pts;i++)tp.push(new THREE.Vector3(ox+(oy-ox)*(i/pts),TY,Z+oz0));
  for(let i=0;i<=pts;i++)tp.push(new THREE.Vector3(oy,TY,Z+oz0+(oz1-oz0)*(i/pts)));
  for(let i=0;i<=pts;i++)tp.push(new THREE.Vector3(oy-(oy-ox)*(i/pts),TY,Z+oz1));
  for(let i=0;i<=pts;i++)tp.push(new THREE.Vector3(ox,TY,Z+oz1-(oz1-oz0)*(i/pts)));
  for(let i=0;i<16;i++){const a=i/16*Math.PI*2;tp.push(new THREE.Vector3(Math.cos(a)*0.25,TY,Z+Math.sin(a)*0.2));}
  const verts=[];for(let i=0;i<tp.length-1;i++)verts.push(tp[i].x,tp[i].y,tp[i].z,tp[i+1].x,tp[i+1].y,tp[i+1].z);
  const geo=new THREE.BufferGeometry;geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(verts),3));
  const pathLine=new THREE.LineSegments(geo,new THREE.LineBasicMaterial({color:EGA.LTBLUE,transparent:true,opacity:0.3}));
  main.add(pathLine);
}

/* ── SPAWN functions ── */
function makePanelTexture(defective){
  return makeCanvasTex(256,96,(x,w,h)=>{
    if(defective){
      x.fillStyle='#AA0000';x.fillRect(0,0,w,h);
      x.strokeStyle='#FFFF55';x.lineWidth=4;x.strokeRect(4,4,w-8,h-8);
      x.fillStyle='#FFFF55';x.font='bold 20px monospace';x.textAlign='center';
      x.fillText('SCRAP',w/2,h/2+8);
    }else{
      x.fillStyle='#AA5500';x.fillRect(0,0,w,h);
      x.strokeStyle='#555555';x.lineWidth=3;x.strokeRect(4,4,w-8,h-8);
      x.fillStyle='#555555';x.font='14px monospace';x.textAlign='center';
      x.fillText('UNKNOWN',w/2,h/2+5);
    }
  });
}

  p.userData={

/* ── Bezier / lerp helpers ── */
function bezt(p0,p1,p2,t){
  const mt=1-t;
  return new THREE.Vector3(mt*mt*p0.x+2*mt*t*p1.x+t*t*p2.x,mt*mt*p0.y+2*mt*t*p1.y+t*t*p2.y,mt*mt*p0.z+2*mt*t*p1.z+t*t*p2.z);
}

/* ── DOS progress bar ── */
function dosBar(val,maxv){
  const f=Math.max(0,Math.min(10,Math.round(val/maxv*10)));
  return '\u2588'.repeat(f)+'\u2591'.repeat(10-f);
}

/* ── INIT ── */
function init(){
  createScene();createWall();createPC();createPlotter();createLibrary();
  createOperator();createPortal();createShockwaves();createDataFlow();
  createHUD();createToolpath();

  setInterval(()=>{const t=(performance.now()-startT)/1000;if(t<9&&monitorMesh)updateMonitorTex(makeHexTex());},1200);
  startT=performance.now();animate();
}

/* ── ANIMATE ── */
function animate(){
  const t=(performance.now()-startT)/1000;

  if(controls.enabled)controls.update();
  else if(t>12){controls.enabled=true;}

  /* ── PORTAL ── */
  if(portalGroup.visible){
    portalOuter.rotation.y+=0.02;portalInner.rotation.y-=0.03;
    portalVortex.forEach(v=>{
      v.userData.angle+=v.userData.speed*0.03;
      v.position.x=Math.cos(v.userData.angle)*0.45;
      v.position.z=Math.sin(v.userData.angle)*0.45;
    });
  }
  if(t>=8&&t<10){
    portalGroup.visible=true;const s=0.3+(t-8)/2*0.7;portalGroup.scale.setScalar(Math.min(1,s));
    portalOuter.material.emissiveIntensity=0.3+0.5*Math.sin(t*8);
    portalInner.material.emissiveIntensity=0.4+0.6*Math.sin(t*9);
  }else if(t>=10){portalGroup.visible=true;portalGroup.scale.setScalar(1);portalOuter.material.emissiveIntensity=0.12;portalInner.material.emissiveIntensity=0.15;}
  else portalGroup.visible=false;

  /* ── SHOCKWAVE RINGS ── */
  shockwaves.forEach((r,i)=>{
    if(t>=8.5+i*0.15&&t<9.5){
      r.visible=true;const sw=(t-8.5-i*0.15)/0.8;
      r.scale.setScalar(1+sw*8);r.material.opacity=0.6*(1-sw);
    }else r.visible=false;
  });

  /* ── OPERATOR ── */
  if(t<7){
    opTorso.rotation.x=0.4;
    opHead.rotation.x=0.35;opHead.rotation.z=0.06*Math.sin(t*1.5);
    opLeftArm.rotation.z=0.6;opLeftArm.rotation.x=0.3;
    opRightArm.rotation.z=-0.6;opRightArm.rotation.x=0.3;
    opMug.position.set(0.30,0.32,0.05);
  }else if(t<9){
    const lt=Math.min(1,(t-7)/2);
    opTorso.rotation.x=0.4*(1-lt);
    opHead.rotation.x=0.35-lt*0.7;opHead.rotation.z=0;
    opLeftArm.rotation.z=0.6-lt*1.4;opLeftArm.rotation.x=0.3-lt*0.2;
    opRightArm.rotation.z=-0.6+lt*1.4;opRightArm.rotation.x=0.3-lt*0.2;
    opMug.position.set(0.30,0.32,0.05);
  }else if(t<20){
    const rt=Math.min(1,(t-9)/4);
    opTorso.rotation.x=-0.1*rt;
    opHead.rotation.x=-0.3*rt;opHead.rotation.z=0.03*Math.sin(t*0.5)*rt;
    opLeftArm.rotation.z=-1.3*rt;opLeftArm.rotation.x=-0.4*rt;
    opRightArm.rotation.z=1.3*rt;opRightArm.rotation.x=-0.4*rt;
    opLegL.rotation.z=0.25*rt;opLegR.rotation.z=-0.25*rt;
    opMug.position.set(0.30,0.32+0.04*Math.sin(t*1.5),0.05);
  }else{
    opTorso.rotation.x=-0.1;
    opHead.rotation.x=-0.3;opHead.rotation.z=0.03*Math.sin(t*0.5);
    opLeftArm.rotation.z=-1.3;opLeftArm.rotation.x=-0.4;
    opRightArm.rotation.z=1.3;opRightArm.rotation.x=-0.4;
    opLegL.rotation.z=0.25;opLegR.rotation.z=-0.25;
    opMug.position.set(0.30,0.33+0.04*Math.sin(t*2.0),0.05);
    if(Math.sin(t*0.4)>0.7)opHead.rotation.x=-0.2;
  }
  opSteam.forEach(sb=>{
    sb.position.y=sb.userData.by+((t*0.6+sb.userData.ph)%1.3)*0.10;
    sb.material.opacity=0.7*(1-((t*0.6+sb.userData.ph)%1.3));
  });

  /* ── QUESTION MARKS ── */
  if(t<8&&t-lastQSpawn>=0.8){spawnQuestionMark();lastQSpawn=t;}
  questionMarks.forEach((qm,i)=>{
    const l=qm.userData.life+0.016;qm.userData.life=l;
    qm.position.x+=qm.userData.velX;qm.position.y+=qm.userData.velY;qm.position.z+=qm.userData.velZ;
    if(l>3){qm.material.opacity=0.9*(1-(l-3)/1.5);}
    if(l>4.5)qm.visible=false;
  });
  questionMarks=questionMarks.filter(q=>q.visible);

  /* ── DATA FLOW: PC → portal → plotter → wall ── */
  const chaosSrc=new THREE.Vector3(-2.5,0.55,-1.5);
  const chaosMid=new THREE.Vector3(-1.5,0.8,-0.5);
  const chaosTgt=new THREE.Vector3(0,0.28,-1.5);
  const libTgt=new THREE.Vector3(2.5,0.4,-1.5);
  const isActive=t>=8,isOrdered=t>=10;
  let timeScale=1;
  if(t>=9&&t<10){const dT=t-9;timeScale=0.3+dT*dT*1.0;if(timeScale>1.3)timeScale=1.3;}

  const colChaos=new THREE.Color(EGA.RED),colClean=new THREE.Color(EGA.GREEN),colClone=new THREE.Color(EGA.LTBLUE);

  dataParticles.forEach(p=>{
    let spd=p.speed*timeScale*0.016;
    p.progress+=spd;if(p.progress>=1){p.progress-=1;p.morphTime=-1;}
    const srcP=new THREE.Vector3(chaosSrc.x,chaosSrc.y,chaosSrc.z+p.zOff);
    const midP=new THREE.Vector3(chaosMid.x+0.4*p.midOff,chaosMid.y,chaosMid.z+p.zOff*0.6);
    const endP=new THREE.Vector3(chaosTgt.x,chaosTgt.y,chaosTgt.z+p.zOff*0.5);
    const pos=bezt(srcP,midP,endP,p.progress);
    const col=isOrdered?colClean:colChaos;
    p.ico.position.copy(pos);p.ico.material.color.copy(col);
    p.cube.position.copy(pos);p.cube.visible=p.morphTime>=0;
    p.ico.visible=!p.cube.visible;
    p.label.position.copy(new THREE.Vector3(pos.x,pos.y+0.12,pos.z));
    if(isOrdered){
      const lbl=CNC_LABELS[Math.floor(p.phase%CNC_LABELS.length)];
      p.label.element.textContent=lbl;const sc=lbl==='OK'||lbl==='ERP'||lbl==='OPT'?'#55FF55':lbl==='H2'?'#FFFF55':'#00AA00';
      p.label.element.style.color=sc;
    }else{
      const ch=['\u6570','\u636E','\u4E71','\u7801','\u9519','\u635F'][Math.floor(p.phase*10)%6];
      p.label.element.textContent=ch+' 0x'+(Math.floor(p.phase*10)%16).toString(16)+Math.floor(Math.random()*10);
      p.label.element.style.color='#AA0000';
    }
    /* trail */
    p.trailVerts[0]=pos.x-0.01;p.trailVerts[1]=pos.y;p.trailVerts[2]=pos.z;
    const ts3=Math.max(0,p.progress-spd*3),ts6=Math.max(0,p.progress-spd*6);
    const tp3=bezt(srcP,midP,endP,ts3),tp6=bezt(srcP,midP,endP,ts6);
    p.trailVerts[3]=tp3.x;p.trailVerts[4]=tp3.y;p.trailVerts[5]=tp3.z;
    p.trailVerts[6]=tp6.x;p.trailVerts[7]=tp6.y;p.trailVerts[8]=tp6.z;
    p.trailVerts[9]=tp6.x;p.trailVerts[10]=tp6.y;p.trailVerts[11]=tp6.z;
    p.trailVerts[12]=pos.x;p.trailVerts[13]=pos.y;p.trailVerts[14]=pos.z;
    for(let i=0;i<5;i++){
      p.trailColors[i*3]=col.r*(1-i*0.25);
      p.trailColors[i*3+1]=col.g*(1-i*0.25);
      p.trailColors[i*3+2]=col.b*(1-i*0.25);
    }
    p.trail.geometry.attributes.position.needsUpdate=true;
    p.trail.geometry.attributes.color.needsUpdate=true;

    if(t>=9&&p.morphTime<0&&Math.abs(p.progress-0.5)<(t-9)*0.3){
      p.morphTime=t;
      for(let bi=0;bi<BURST_PER;bi++){
        const idx=p.burstIdx+bi;
        if(idx<burstPool.length){
          const b=burstPool[idx];b.position.copy(pos);b.visible=true;b.material.opacity=0.8;
          const a=bi/BURST_PER*Math.PI*2,phi=(bi%BURST_PER)/(BURST_PER-1)*Math.PI;
          b.userData={life:0,dir:new THREE.Vector3(Math.cos(a)*Math.sin(phi),Math.cos(phi),Math.sin(a)*Math.sin(phi)).normalize()};
        }
      }
    }
  });

  dataClones.forEach(c=>{
    if(!isOrdered){c.cube.visible=false;c.label.visible=false;return;}
    c.progress+=c.speed*0.016;
    if(c.progress>1){c.progress=-0.5;c.cube.visible=false;c.label.visible=false;}
    else if(c.progress>=0){
      c.cube.visible=true;c.label.visible=true;
      const pos=bezt(chaosMid,new THREE.Vector3(1,0.5,-0.5),libTgt,Math.min(1,c.progress));
      c.cube.position.copy(pos);c.cube.material.color.copy(colClone);
      c.label.position.copy(new THREE.Vector3(pos.x,pos.y+0.12,pos.z));
      c.label.element.textContent=CNC_LABELS[Math.floor(c.phase)%CNC_LABELS.length];
      c.label.element.style.color='#5555FF';
      c.trailVerts[0]=pos.x-0.01;c.trailVerts[1]=pos.y;c.trailVerts[2]=pos.z;
      const tp3=bezt(chaosMid,new THREE.Vector3(1,0.5,-0.5),libTgt,Math.max(0,c.progress-c.speed*3));
      c.trailVerts[3]=tp3.x;c.trailVerts[4]=tp3.y;c.trailVerts[5]=tp3.z;
      c.trailVerts[6]=pos.x;c.trailVerts[7]=pos.y;c.trailVerts[8]=pos.z;
      c.trailVerts[9]=pos.x;c.trailVerts[10]=pos.y;c.trailVerts[11]=pos.z;
      c.trailVerts[12]=pos.x;c.trailVerts[13]=pos.y;c.trailVerts[14]=pos.z;
      for(let i=0;i<5;i++){
        c.trailColors[i*3]=colClone.r*(1-i*0.25);
        c.trailColors[i*3+1]=colClone.g*(1-i*0.25);
        c.trailColors[i*3+2]=colClone.b*(1-i*0.25);
      }
      c.trail.geometry.attributes.position.needsUpdate=true;
      c.trail.geometry.attributes.color.needsUpdate=true;
    }
  });

  burstPool.forEach(b=>{
    if(!b.visible)return;
    b.userData.life+=0.016;const l=b.userData.life;
    b.position.x+=b.userData.dir.x*0.04;
    b.position.y+=b.userData.dir.y*0.04;
    b.position.z+=b.userData.dir.z*0.04;
    b.material.opacity=0.8*(1-l*4);
    if(l>0.25){b.visible=false;b.material.opacity=0;}
  });

  /* ── WALL PANELS: spawn & flight ── */
  if(t<8&&t-lastPanelSpawn>=0.65){
    const cnt=wallPanels.length;
    spawnWallPanel(cnt>0&&(cnt+1)%3===0);
    lastPanelSpawn=t;
  }
  wallPanels.forEach(p=>{
    if(p.userData.arrived)return;
    p.userData.flightTime+=0.016;
    const ft=p.userData.flightTime/max(p.userData.maxFlight,0.5);
    const ep=Math.min(1,ft);
    const ease=1-Math.pow(1-ep,3);
    p.position.lerpVectors(p.userData.startPos,p.userData.targetPos,ease);
    if(ft>=0.95){p.position.copy(p.userData.targetPos);p.userData.arrived=true;
      p.rotation.z=(Math.random()-0.5)*0.3;
    }
  });

  /* ── DEFRAG / REARRANGE ── */
  if(t>=10&&defragStart<0){
    defragStart=t;
    wallPanels.forEach(p=>{
      p.userData.origPos=p.position.clone();
      p.userData.origRot=p.rotation.z;
      p.userData.idealTarget=wallGridPos(p.userData.targetCell);
    });
  }
  if(defragStart>=0&&!defragDone){
    const rp=Math.min(1,(t-defragStart)/3.5);
    const c3=2.70158,ep=rp<1?1+c3*Math.pow(rp-1,3)+1.70158*Math.pow(rp-1,2):1;
    let allDone=true;
    wallPanels.forEach(p=>{
      if(!p.userData.idealTarget)return;
      const ot=p.userData.origPos,tt=p.userData.idealTarget;
      p.position.lerpVectors(ot,tt,ep);
      p.rotation.z=p.userData.origRot*(1-ep);
      if(ep<0.5)allDone=false;
      if(ep>0.1){
        const cp=Math.min(1,(ep-0.1)/0.9);
        const cc=p.userData.defective?new THREE.Color(EGA.RED).lerp(new THREE.Color(EGA.GREEN),cp):new THREE.Color(EGA.BROWN).lerp(new THREE.Color(EGA.GREEN),cp);
        p.material.color.copy(cc);
      }
      if(ep>0.5&&p.userData.defectMesh){p.userData.defectMesh.visible=false;}
    });
    if(rp>=1){defragDone=true;
      wallPanels.forEach(p=>{p.userData.defective=false;});
    }
  }

  /* ── ORDERED PANELS spawn ── */
  if(t>=10&&t-lastPanelSpawn>=1.0&&orderedPanels.length<8){spawnOrderedPanel();lastPanelSpawn=t;}
  orderedPanels.forEach(p=>{
    if(p.userData.popIn>0){
      p.userData.popIn-=0.016;
      const s=Math.min(1,1-p.userData.popIn/0.3);
      const es=1-Math.pow(1-s,3);
      p.scale.setScalar(es);
      if(p.userData.popIn<=0){p.scale.setScalar(1);p.userData.popIn=0;}
    }
    const tp=p.userData.targetPos||wallGridPos(p.userData.targetCell);
    p.position.x+=(tp.x-p.position.x)*0.06;
    p.position.y+=(tp.y-p.position.y)*0.06;
    p.position.z+=(tp.z-p.position.z)*0.06;
  });

  /* ── GURU MEDITATION ── */
  if(t>8.1&&t<8.5&&!guruShown){guruShown=true;updateMonitorTex(makeGuruTex());
    setTimeout(()=>{if(monitorMesh)updateMonitorTex(makeHexTex());},500);
  }

  /* ── DOLLARS ── */
  if(t>=13&&t-lastDollarSpawn>=1.5&&dollars.length<DOLLAR_MAX){spawnDollar();lastDollarSpawn=t;}
  if(t>22&&t-lastDollarSpawn>=3&&dollars.length<DOLLAR_MAX){spawnDollar();lastDollarSpawn=t;}
  dollars.forEach(d=>{
    d.userData.vy-=0.0002;
    d.position.y+=d.userData.vy;d.position.x+=d.userData.vx;d.position.z+=d.userData.vz;
    d.rotation.x+=d.userData.rotSpeed;d.rotation.y+=d.userData.rotSpeed*0.6;
    if(d.position.y<=GND+0.1)d.position.y=GND+0.1;
    d.userData.life=(t-d.userData.st);
    if(d.userData.life>8){d.material.opacity=Math.max(0,1-(d.userData.life-8)/2);}
  });
  for(let i=dollars.length-1;i>=0;i--){
    if(dollars[i].userData.life>10){main.remove(dollars[i]);dollars.splice(i,1);}
  }

  /* ── PLOTTER ANIMATION ── */
  if(t>=10&&plGantry)plGantry.position.x=Math.sin(t*0.6)*0.25;
  if(t>=10&&plSpindle)plSpindle.position.y=GND+0.24+Math.abs(Math.sin(t*2.5))*0.06;

  /* ── LIGHT COLOR ── */
  if(t>=8&&isOrdered)plLight.color.set(EGA.GREEN);
  else if(t>=8)plLight.color.set(EGA.YELLOW);
  else plLight.color.set(EGA.BROWN);

  /* ── ENTROPY / HUD ── */
  let entropy;
  if(t<8)entropy=94;else if(t<=22)entropy=94-(t-8)*(88/14);else entropy=6;
  const eVal=Math.round(Math.max(6,entropy));
  let ec;if(entropy>=50)ec=new THREE.Color(EGA.YELLOW).lerp(new THREE.Color(EGA.RED),(entropy-50)/44);
  else ec=new THREE.Color(EGA.GREEN).lerp(new THREE.Color(EGA.YELLOW),(entropy-6)/44);
  const eHex='#'+ec.getHexString();
  entropyDiv.textContent='\u250C\u2500 ENTROPY \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502 '+dosBar(eVal-6,88)+' '+eVal+'% \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518';
  entropyDiv.style.color=eHex;

  let st,sc;
  if(t<8){st='UNSTRUCTURED DATA '+(Math.floor(t*2)%2===0?'\u2592':' ');sc='#AA0000';}
  else if(t<10){st='DECODING \u26A1 '+(Math.floor(t*4)%2===0?'\u2592\u2592':'\u2591\u2591');sc='#FFFF55';}
  else{st='DETERMINISTIC OUTPUT \u2592';sc='#00AA00';}
  if(t>22){st='ENGINE V20 \u00B7 IDLE \u2592';}
  statusDiv.textContent='\u250C\u2500 STATUS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502 '+st.padEnd(20)+'\u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518';
  statusDiv.style.color=sc;

  const doneCount=wallPanels.filter(p=>p.userData.arrived).length+(defragDone?orderedPanels.length:0);
  const totalP=wallPanels.length+(defragDone?orderedPanels.length:0);
  const savedMin=Math.floor(t*0.4);
  metricsDiv.textContent='\u250C\u2500 METRICS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502 T:'+Math.floor(t)+'s D:'+doneCount+'/'+totalP+' S:'+savedMin+'\u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518';
  metricsDiv.style.color=t>10?'#00AA00':'#555555';

  /* ── FLASH ── */
  if(t>=9.2&&t<9.5)scene.background=new THREE.Color(EGA.WHITE);
  else if(t>=9.5&&scene.background.getHex()===EGA.WHITE)scene.background=new THREE.Color(EGA.BLACK);

  /* ── RENDER ── */
  renderer.render(scene,camera);lr.render(scene,camera);
  requestAnimationFrame(animate);
}

/* fixed max */
function max(a,b){return a>b?a:b;}

init();
</script>
</body>
</html>
